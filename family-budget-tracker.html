    '<button class="btn-ghost" onclick="openCashMovementForm()">手動存入／提出</button> <button class="btn-ghost" onclick="openCashReconciliation()">對帳</button></div>' + settings +
    '<div class="card"><h2>現金流水</h2>' + renderListFilterBar('cashWallet') +
    '<label>來源快速篩選</label><select id="cashWalletSource" onchange="handleCashWalletFilterChange()"><option value="all"' + optSelected(f.source,'all') + '>全部</option><option value="manual"' + optSelected(f.source,'manual') + '>手動</option><option value="personal"' + optSelected(f.source,'personal') + '>個人支出</option><option value="familyDeposit"' + optSelected(f.source,'familyDeposit') + '>存入家用</option><option value="reimbursement"' + optSelected(f.source,'reimbursement') + '>補款</option></select>' +
    '<div class="detail-tools">' + renderDetailSearch('cashWallet', '搜尋現金流水', ledger.length, 'cashWallet', false) + '</div>' + list + '</div>';
}

// ===================== 4. UI：銀行帳戶 =====================
function accountLedgerSourceMatches(entry, source) {
  if (!source || source === 'all') return true;
  if (source === 'family') return entry.kind === 'family' || entry.kind === 'familyDeposit' || entry.kind === 'familyReimbursement';
  if (source === 'credit') return entry.kind === 'cardPayment';
  return entry.kind === source;
}

function filterAccountLedgerEntries(accountId) {
  const f = listFilters.accountMovements;
  const scoped = accountLedgerEntries(accountId).filter(entry =>
    (f.showAll || entry.date.slice(0, 7) === f.month) && accountLedgerSourceMatches(entry, f.source)
  );
  return scoped.filter(entry => recordMatchesSearch(entry, f.search, ledgerSearchText));
}

function renderAccountLedgerFilterBar() {
  const f = listFilters.accountMovements;
  const matchCount = state.data.bankAccounts.reduce((total, account) => total + filterAccountLedgerEntries(account.id).length, 0);
  return renderListFilterBar('accountMovements') +
    '<div class="ledger-filter"><label>流水來源<select id="accountLedgerSource" onchange="handleAccountLedgerSourceChange()">' +
    '<option value="all"' + optSelected(f.source, 'all') + '>全部</option>' +
    '<option value="personal"' + optSelected(f.source, 'personal') + '>個人</option>' +
    '<option value="family"' + optSelected(f.source, 'family') + '>家庭</option>' +
    '<option value="credit"' + optSelected(f.source, 'credit') + '>信用卡</option>' +
    '<option value="manual"' + optSelected(f.source, 'manual') + '>手動</option>' +
    '</select></label></div>' +
    '<div class="detail-tools">' + renderDetailSearch('accountMovements', '搜尋帳戶流水', matchCount, 'account:', true) + '</div>';
}

function handleAccountLedgerSourceChange() {
  listFilters.accountMovements.source = document.getElementById('accountLedgerSource').value;
  render();
}

function openAccountLedgerSource(accountId, source, sourceId) {
  if (source === 'accountManualMovements') return openMovementForm(accountId, sourceId);
  if (source === 'transactions') return openEditTransaction(sourceId);
  if (source === 'familyFundDeposits') return openEditDeposit(sourceId);
  if (source === 'familyFundReimbursements') return openEditReimbursement(sourceId);
  if (source === 'creditCardPayments') {
    const payment = state.data.creditCardPayments.find(p => p.id === sourceId);
    if (payment) return openPaymentForm(payment.cardId, sourceId);
  }
  showToast('找不到這筆流水的原始記錄');
}

function renderBankAccounts() {
  const bankOptions = state.data.banks.map(b => '<option value="' + b.id + '">' + escapeHtml(b.name) + '</option>').join('');

  const accountsHtml = state.data.bankAccounts.map(a => {
    const balance = bankAccountBalance(a.id);
    const bank = state.data.banks.find(b => b.id === a.bankId);
    const ledger = filterAccountLedgerEntries(a.id);
    const ledgerHtml = renderDateGroups('account:' + a.id, ledger, entry => ledgerEntryHtml(entry,
      'openAccountLedgerSource(\'' + a.id + '\',\'' + entry.source + '\',\'' + entry.sourceId + '\')'),
      group => signedMoney(group.reduce((total, entry) => total + entry.delta, 0)),
      renderDetailEmpty('accountMovements', normalizedSearch(listFilters.accountMovements.search) ? '目前範圍找不到符合的帳戶流水。' : emptyListMessage('accountMovements', '帳戶流水')),
      'detail-account', true);
    return (
      '<div class="card" data-record-id="' + a.id + '">' +
      '<div class="account-balance-row"><b>' + escapeHtml(a.name) + '</b>' +
      '<span class="big' + (balance < 0 ? ' neg' : '') + '">' + money(balance) + '</span></div>' +
      '<div class="muted">' + (bank ? escapeHtml(bank.name) : '未指定銀行') + ' · ' + escapeHtml(a.accountType) + '</div>' +
      renderLastReconciliation('bankAccount', a.id) +
      renderReconciliationHistory('bankAccount', a.id) +
      '<button class="btn-ghost" onclick="handleAddMovement(\'' + a.id + '\')">手動存入/提出</button> ' +
      '<button class="btn-ghost" onclick="openReconcileBankAccount(\'' + a.id + '\')">對帳</button> ' +
      '<button class="btn-danger" onclick="handleDeleteAccount(\'' + a.id + '\')">刪除帳戶</button>' +
      '<details class="tucked" open><summary>帳戶流水（' + ledger.length + '）</summary>' +
      ledgerHtml + '</details>' +
      '</div>'
    );
  }).join('');

  return (
    '<div class="page-summary-row"><h2>個人銀行帳戶</h2><span class="big">總資產 ' + money(bankAccountsTotalAssets()) + '</span></div>' +
    '<div class="card"><h2>帳戶流水篩選</h2>' + renderAccountLedgerFilterBar() + '</div>' +
    accountsHtml +
    '<div class="card"><h2>新增帳戶</h2>' +
    '<label>帳戶名稱</label><input id="newAccName" placeholder="例如：國泰儲蓄">' +
    '<label>所屬銀行</label><select id="newAccBank"><option value="">（不指定）</option>' + bankOptions + '</select>' +
    '<label>清單沒有？新增所屬銀行（選填）</label><input id="newAccBankName" placeholder="例如：國泰、玉山、中信">' +
    '<div class="muted">這裡新增的銀行會同步出現在信用卡的「發卡銀行」清單。</div>' +
    '<label>帳戶類型</label><select id="newAccType"><option>儲蓄</option><option>股票</option><option>其他</option></select>' +
    '<label>期初餘額</label><input id="newAccOpening" type="number" value="0">' +
    '<button class="btn-primary" onclick="handleAddAccount()">新增帳戶</button></div>'
  );
}

function findOrCreateBankByName(name) {
  const cleanName = String(name || '').trim();
  if (!cleanName) return null;
  const existingBank = state.data.banks.find(b => b.name === cleanName);
  return existingBank || addRecord('banks', { name: cleanName });
}

function handleAddAccount() {
  const name = document.getElementById('newAccName').value.trim();
  let bankId = document.getElementById('newAccBank').value || null;
  const newBankName = document.getElementById('newAccBankName').value.trim();
  const accountType = document.getElementById('newAccType').value;
  const openingBalance = parseAnyInt(document.getElementById('newAccOpening').value);
  if (!name) { showFieldError('newAccName', '請輸入帳戶名稱'); return; }
  if (openingBalance === null) { showFieldError('newAccOpening', '期初餘額必須是整數（可以是 0 或負數，但不能有文字）'); return; }
  if (newBankName) {
    const savedBank = findOrCreateBankByName(newBankName);
    if (!savedBank) { showToast('新增銀行失敗（可能處於鎖定狀態或儲存空間問題），請到備份頁確認'); return; }
    bankId = savedBank.id;
  }
  const saved = addRecord('bankAccounts', { name, bankId, accountType, openingBalance });
  render();
  revealRecord(saved && saved.id);
}

function handleDeleteAccount(id) {
  const referenced =
    state.data.transactions.some(t => t.accountId === id) ||
    state.data.familyFundDeposits.some(d => d.fromAccountId === id) ||
    state.data.familyFundReimbursements.some(r => r.toAccountId === id) ||
    state.data.creditCardPayments.some(p => p.fromAccountId === id) ||
    state.data.accountManualMovements.some(m => m.accountId === id);
  if (referenced) { alert('這個帳戶還有記錄在使用，無法刪除。'); return; }
  openConfirmModal('刪除帳戶', '確定刪除這個帳戶？', () => {
    deleteWithFeedback('bankAccounts', id, '已刪除帳戶');
  }, '刪除');
}

function movementFieldsHtml(record) {
  record = record || {};
  const dir = record.direction || '存入';
  return (
    '<label>方向</label><select id="mvDir"><option value="存入"' + optSelected(dir, '存入') + '>存入</option><option value="提出"' + optSelected(dir, '提出') + '>提出</option></select>' +
    '<label>金額</label><input id="mvAmount" type="number" min="1" inputmode="numeric" value="' + inputVal(record.amount) + '">' +
    '<label>日期</label><input id="mvDate" type="date" value="' + (record.date || todayLocalDate()) + '">' +
    '<label>備注（選填）</label><input id="mvNote" value="' + inputVal(record.note) + '">'
  );
}

function readMovementFields() {
  const amount = parsePositiveInt(document.getElementById('mvAmount').value);
  if (amount === null) { showFieldError('mvAmount', '金額必須是正整數'); return null; }
  const date = document.getElementById('mvDate').value;
  if (!date) { showFieldError('mvDate', '請選擇日期'); return null; }
  return { date, amount, direction: document.getElementById('mvDir').value, note: document.getElementById('mvNote').value.trim() };
}

function openMovementForm(accountId, editId) {
  const acc = state.data.bankAccounts.find(a => a.id === accountId);
  if (!acc) { showToast('找不到這個帳戶'); return; }
  const editRec = editId ? state.data.accountManualMovements.find(m => m.id === editId) : null;
  if (editId && !editRec) { showToast('找不到這筆異動'); return; }
  openModal(editId ? '編輯異動' : '手動存入 / 提出',
    '<div class="muted">帳戶：' + escapeHtml(acc.name) + '</div>' +
    movementFieldsHtml(editRec) +
    '<button class="btn-primary" onclick="submitMovement(\'' + accountId + '\'' + (editId ? ', \'' + editId + '\'' : '') + ')">儲存</button>' +
    modalCancelButton());
}

function submitMovement(accountId, editId) {
  const original = editId ? state.data.accountManualMovements.find(m => m.id === editId) : null;
  const oldDate = original ? original.date : null;
  const fields = readMovementFields();
  if (!fields) return;
  const saved = editId
    ? updateRecord('accountManualMovements', editId, Object.assign({ accountId }, fields))
    : addRecord('accountManualMovements', Object.assign({ accountId }, fields));
  if (!saved) { showToast('儲存失敗（可能處於鎖定狀態或儲存空間問題），請到備份頁確認'); return; }
  closeModal();
  renderKeepScroll();
  revealRecord(saved.id);
  const msg = (editId ? '已更新：' : '') + fields.direction + ' ' + money(fields.amount);
  showToast(editId ? editSuccessMessage('accountMovements', oldDate, fields.date, msg) : msg);
}

function handleAddMovement(accountId) {
  openMovementForm(accountId);
}

function handleDeleteMovement(id) {
  const m = state.data.accountManualMovements.find(x => x.id === id);
  const detail = m ? (m.date + ' ' + m.direction + ' ' + money(m.amount) + (m.note ? '：' + m.note : '')) : '這筆異動記錄';
  openConfirmModal('刪除異動', '確定刪除「' + detail + '」？刪除後帳戶餘額會重新計算。', () => {
    deleteWithFeedback('accountManualMovements', id, '已刪除異動');
  }, '刪除');
}

// ===================== 5. UI：信用卡 =====================
let creditCardViewPeriod = null;

function cardLedgerSourceMatches(entry, source) {
  if (!source || source === 'all') return true;
  if (source === 'personal') return entry.kind === 'personalCharge';
  if (source === 'family') return entry.kind === 'familyCharge';
  if (source === 'installment') return entry.kind === 'installmentCreated' || entry.kind === 'installmentPayment';
  if (source === 'payment') return entry.kind === 'payment';
  return false;
}

function filterCreditCardLedgerEntries(cardId) {
  const f = listFilters.creditCardPayments;
  const scoped = creditCardLedgerEntries(cardId).filter(entry =>
    (f.showAll || (entry.date || '').slice(0, 7) === f.month) && cardLedgerSourceMatches(entry, f.source)
  );
  return scoped.filter(entry => recordMatchesSearch(entry, f.search, ledgerSearchText));
}

function handleCardLedgerSourceChange() {
  listFilters.creditCardPayments.source = document.getElementById('cardLedgerSource').value;
  renderKeepScroll();
}

function openCardLedgerSource(cardId, kind, sourceId) {
  if (kind === 'payment') return openPaymentForm(cardId, sourceId);
  if (kind === 'installmentCreated' || kind === 'installmentPayment') return openInstallmentForm(cardId, sourceId.replace(/p\d+$/, ''));
  if (kind === 'personalCharge' || kind === 'familyCharge') return openEditTransaction(sourceId, kind === 'familyCharge' ? 'family' : 'personal');
}

function renderCreditCards() {
  const bankOptions = state.data.banks.map(b => '<option value="' + b.id + '">' + escapeHtml(b.name) + '</option>').join('');
  const accountOptions = state.data.bankAccounts.map(a => '<option value="' + a.id + '">' + escapeHtml(a.name) + '</option>').join('');

  const cardsHtml = state.data.creditCards.map(c => {
    const bank = state.data.banks.find(b => b.id === c.bankId);
    const owed = creditCardTotalOwed(c.id);
    const installmentPrincipalTotal = creditCardInstallmentPrincipal(c.id);
    const period = creditCardViewPeriod || currentBillingPeriod(c);
    const due = creditCardDueForPeriod(c.id, period);
    const paid = sum(state.data.creditCardPayments.filter(p => p.cardId === c.id), 'amount');
    const avail = creditCardAvailableCredit(c.id);
    const reminder = cardPaymentReminder(c);
    const cardLedger = filterCreditCardLedgerEntries(c.id);
    const paymentsHtml = renderDateGroups('card:' + c.id, cardLedger, entry => ledgerEntryHtml(entry,
      '<button class="btn-ghost" onclick="openCardLedgerSource(\'' + c.id + '\',\'' + entry.kind + '\',\'' + entry.sourceId + '\')">編輯</button>' +
      (entry.kind === 'payment' ? '<button class="btn-danger" onclick="handleDeletePayment(\'' + entry.sourceId + '\')">刪除</button>' : ''),
      '<div class="muted">交易後總欠款 ' + money(entry.balanceAfter) + '</div>'),
      rows => signedMoney(rows.reduce((n, e) => n + e.delta, 0)),
      renderDetailEmpty('creditCardPayments', normalizedSearch(listFilters.creditCardPayments.search) ? '目前範圍找不到符合的信用卡流水。' : '尚無信用卡流水'), 'detail-account', true);
    const installmentsHtml = c.installments.map(inst => {
      const remaining = installmentRemainingPrincipal(inst);
      const remainingPeriods = Math.max(0, inst.totalPeriods - inst.paidPeriods);
      const done = inst.paidPeriods >= inst.totalPeriods;
      return '<li data-record-id="' + inst.id + '"><div><b>' + (escapeHtml(inst.note) || '分期') + '</b></div>' +
        '<div class="muted">每期 ' + money(inst.perInstallment) + '</div>' +
        '<div class="muted">已繳 ' + inst.paidPeriods + ' / ' + inst.totalPeriods + ' 期' + (done ? '（已結清）' : '，剩餘 ' + remainingPeriods + ' 期') + '</div>' +
        (done ? '' : '<div class="muted">剩餘本金 ' + money(remaining) + '</div>') +
        '<div class="action-row">' +
        (done ? '' : '<button class="btn-ghost" onclick="handleAdvanceInstallment(\'' + c.id + '\', \'' + inst.id + '\')">標記已繳一期</button>') +
        '<button class="btn-ghost" onclick="openInstallmentForm(\'' + c.id + '\', \'' + inst.id + '\')">編輯</button>' +
        '<button class="btn-danger" onclick="handleDeleteInstallment(\'' + c.id + '\', \'' + inst.id + '\')">刪除</button>' +
        '</div></li>';
    }).join('');
    const alertHtml = reminder.level === 'none' ? '' :
      '<div class="' + (reminder.level === 'overdue' ? 'alert-overdue' : 'alert-due') + '">' +
      (reminder.level === 'overdue' ? '已逾期' : '即將到期') + '：' +
      formatDateShort(reminder.dueDate) + ' 前要處理，截至本期尚未還款 ' + money(reminder.amount) +
      '</div>';
    return (
      '<div class="card" data-record-id="' + c.id + '">' +
      '<div class="row"><b>' + escapeHtml(c.name) + '</b><span class="muted">' + (bank ? escapeHtml(bank.name) : '') + '</span></div>' +
      alertHtml +
      '<div class="metric-row"><span>總欠款</span><span class="big metric-value">' + money(owed) + '</span></div>' +
      (installmentPrincipalTotal > 0 ? '<div class="muted">含分期剩餘本金 ' + money(installmentPrincipalTotal) + '</div>' : '') +
      '<div class="metric-row"><span>本期應繳</span><span class="metric-value">' + money(due) + '</span></div>' +
      '<div class="metric-row"><span>累計已還款</span><span class="metric-value">' + money(paid) + '</span></div>' +
      '<div class="metric-row"><span>剩餘額度</span><span class="metric-value">' + money(avail) + '</span></div>' +
      '<div class="muted">查看帳期 ' + period + ' · 結帳日 ' + c.statementDay + ' 號 · 繳款日 ' + c.dueDay + ' 號</div>' +
      renderLastReconciliation('creditCard', c.id) +
      renderReconciliationHistory('creditCard', c.id) +
      '<button class="btn-ghost" onclick="handleAddPayment(\'' + c.id + '\')">新增還款</button> ' +
      '<button class="btn-ghost" onclick="openReconcileCard(\'' + c.id + '\')">對帳</button> ' +
      '<button class="btn-danger" onclick="handleDeleteCard(\'' + c.id + '\')">刪除卡片</button>' +
      '<details class="tucked" open><summary>分期付款（' + c.installments.length + '）</summary>' +
      '<div class="muted">「標記已繳一期」只更新分期進度，不會新增信用卡還款紀錄，也不會扣任何銀行帳戶。</div>' +
      '<ul class="list">' + (installmentsHtml || '<li class="muted">尚無分期，先新增第一筆</li>') + '</ul>' +
      '<button class="btn-ghost" onclick="openInstallmentForm(\'' + c.id + '\')">新增分期</button></details>' +
      '<details class="tucked" open><summary>信用卡流水</summary>' + paymentsHtml + '</details>' +
      '</div>'
    );
  }).join('') || '<div class="card"><div class="muted">尚無信用卡，先新增第一張</div></div>';

  return (
    '<h2>信用卡</h2>' +
    '<h2 class="section-title">帳期與還款</h2>' +
    '<div class="card">' +
      '<label>查看帳期（留空＝各卡目前帳期）</label>' +
      '<input id="creditCardViewPeriod" type="month" value="' + (creditCardViewPeriod || '') + '" onchange="handleCreditCardPeriodChange()">' +
      '<button class="btn-ghost" onclick="creditCardViewPeriod=null;render()">使用各卡目前帳期</button>' +
      '<div class="muted" style="margin-top:8px">提醒依照「截至本期累計應繳 − 累計已還款」推算；如果已繳信用卡但沒有在這裡記錄還款，可能會誤報逾期。</div>' +
      '<h2 style="margin-top:14px">信用卡流水篩選</h2>' + renderListFilterBar('creditCardPayments') +
      '<label>來源快速篩選</label><select id="cardLedgerSource" onchange="handleCardLedgerSourceChange()"><option value="all"' + optSelected(listFilters.creditCardPayments.source,'all') + '>全部</option><option value="personal"' + optSelected(listFilters.creditCardPayments.source,'personal') + '>個人刷卡</option><option value="family"' + optSelected(listFilters.creditCardPayments.source,'family') + '>家庭刷卡</option><option value="installment"' + optSelected(listFilters.creditCardPayments.source,'installment') + '>分期</option><option value="payment"' + optSelected(listFilters.creditCardPayments.source,'payment') + '>還款</option></select>' +
      '<div class="detail-tools">' + renderDetailSearch('creditCardPayments', '搜尋信用卡流水', state.data.creditCards.reduce((n, card) => n + filterCreditCardLedgerEntries(card.id).length, 0), 'card:', true) + '</div>' +
    '</div>' +
    '<h2 class="section-title">信用卡總覽</h2>' + cardsHtml +
    '<h2 class="section-title">新增卡片</h2>' +
    '<div class="card"><h2>新增信用卡</h2>' +
    '<label>卡片名稱</label><input id="newCardName">' +
    '<label>發卡銀行（信用卡所屬銀行，不是還款帳戶）</label><select id="newCardBank"><option value="">（不指定）</option>' + bankOptions + '</select>' +
    '<label>清單沒有？新增發卡銀行（選填）</label><input id="newCardBankName" placeholder="例如：玉山、匯豐、樂天">' +
    '<div class="muted">若你只新增了帳戶但沒有設定所屬銀行，這裡不會自動出現；請在這裡新增發卡銀行，或回帳戶頁補上所屬銀行。</div>' +
    '<label>額度</label><input id="newCardLimit" type="number" inputmode="numeric">' +
    '<label>結帳日（幾號）</label><input id="newCardStatementDay" type="number" inputmode="numeric" min="1" max="31">' +
    '<label>繳款到期日（幾號）</label><input id="newCardDueDay" type="number" inputmode="numeric" min="1" max="31">' +
    '<button class="btn-primary" onclick="handleAddCard()">新增卡片</button></div>' +
    (accountOptions ? '' : '<p class="muted">沒有個人銀行帳戶也可以新增信用卡；記錄還款時可選「不指定帳戶」，只減少信用卡欠款，不扣個人帳戶。</p>')
  );
}

function handleCreditCardPeriodChange() {
  const value = document.getElementById('creditCardViewPeriod').value;
  creditCardViewPeriod = value || null;
  render();
}

function handleAddCard() {
  const name = document.getElementById('newCardName').value.trim();
  let bankId = document.getElementById('newCardBank').value || null;
  const newBankName = document.getElementById('newCardBankName').value.trim();
  const creditLimit = parsePositiveInt(document.getElementById('newCardLimit').value);
  const statementDay = parsePositiveInt(document.getElementById('newCardStatementDay').value);
  const dueDay = parsePositiveInt(document.getElementById('newCardDueDay').value);
  if (!name) { showFieldError('newCardName', '請輸入卡片名稱'); return; }
  if (creditLimit === null) { showFieldError('newCardLimit', '額度必須是正整數'); return; }
  if (statementDay === null || statementDay > 31) { showFieldError('newCardStatementDay', '結帳日要是 1-31 之間的數字'); return; }
  if (dueDay === null || dueDay > 31) { showFieldError('newCardDueDay', '繳款日要是 1-31 之間的數字'); return; }
  if (newBankName) {
    const savedBank = findOrCreateBankByName(newBankName);
    if (!savedBank) { showToast('新增發卡銀行失敗（可能處於鎖定狀態或儲存空間問題），請到備份頁確認'); return; }
    bankId = savedBank.id;
  }
  const saved = addRecord('creditCards', { name, bankId, creditLimit, statementDay, dueDay, installments: [] });
  render();
  revealRecord(saved && saved.id);
}

function handleDeleteCard(id) {

function openPaymentForm(cardId, editId) {
  const card = state.data.creditCards.find(c => c.id === cardId);
  if (!card) { showToast('找不到這張信用卡'); return; }
  const editRec = editId ? state.data.creditCardPayments.find(p => p.id === editId) : null;
  if (editId && !editRec) { showToast('找不到這筆還款'); return; }
  const activeInstallments = card.installments.filter(i => i.paidPeriods < i.totalPeriods);
  const suggested = editId ? editRec.amount : Math.max(1, creditCardDueForPeriod(cardId, currentBillingPeriod(card)));
  const installmentChoices = editId || !activeInstallments.length ? '' :
    '<div class="card"><b>同時標記分期已繳一期</b><div class="muted">以下預設勾選；未勾選的分期不會變動。</div>' + activeInstallments.map(inst =>
      '<label><input type="checkbox" class="pay-installment-check" value="' + inst.id + '" checked> ' + escapeHtml(inst.note || '分期') + '，每期 ' + money(inst.perInstallment) + '（' + inst.paidPeriods + '/' + inst.totalPeriods + '）</label>'
    ).join('') + '</div>';
  openModal(editId ? '編輯還款' : '信用卡還款',
    '<div class="muted">卡片：' + escapeHtml(card.name) + '</div>' +
    (!editId ? '<div class="muted">建議金額：' + money(suggested) + '</div>' : '') +
    paymentFieldsHtml(editId ? editRec : { amount: suggested, date: todayLocalDate() }) + installmentChoices +
    '<button class="btn-primary" onclick="submitPayment(\'' + cardId + '\'' + (editId ? ', \'' + editId + '\'' : '') + ')">儲存</button>' +
    modalCancelButton());
}

function submitPayment(cardId, editId) {
  const original = editId ? state.data.creditCardPayments.find(p => p.id === editId) : null;
  const oldDate = original ? original.date : null;
  const fields = readPaymentFields();
  if (!fields) return;
  const owedBeforeThisPayment = editId ? null : creditCardTotalOwed(cardId);
  const saved = editId
    ? updateRecord('creditCardPayments', editId, Object.assign({ cardId }, fields))
    : addRecord('creditCardPayments', Object.assign({ cardId }, fields));
  if (!saved) { showToast('儲存失敗（可能處於鎖定狀態或儲存空間問題），請到備份頁確認'); return; }
  if (!editId) {
    const checkedIds = Array.from(document.querySelectorAll('.pay-installment-check:checked')).map(el => el.value);
    const card = state.data.creditCards.find(c => c.id === cardId);
    for (const id of checkedIds) {
      const inst = card && card.installments.find(i => i.id === id);
      if (inst && inst.paidPeriods < inst.totalPeriods) {
        const updated = updateInstallment(cardId, id, { paidPeriods: inst.paidPeriods + 1, paidDates: (inst.paidDates || []).concat(fields.date) });
        if (!updated) { showToast('還款已儲存，但分期進度更新失敗，請立即到備份頁確認'); return; }
      }
    }
  }
  closeModal();
  renderKeepScroll();
  revealRecord(saved.id);
  const remaining = creditCardTotalOwed(cardId);
  if (editId) {
    showToast(editSuccessMessage('creditCardPayments', oldDate, fields.date, '已更新還款 ' + money(fields.amount) + '，剩餘欠款 ' + money(remaining)));
  } else {
    showToast('已還款 ' + money(fields.amount) + '，剩餘欠款 ' + money(remaining) + (fields.amount > owedBeforeThisPayment ? '（含溢繳）' : ''));
  }
}

function handleDeletePayment(id) {
  const p = state.data.creditCardPayments.find(x => x.id === id);
  const account = p ? state.data.bankAccounts.find(a => a.id === p.fromAccountId) : null;
  const source = p ? (account ? '，來源帳戶：' + account.name : '，來源帳戶：未指定') : '';
  const detail = p ? (p.date + ' ' + money(p.amount) + source + (p.note ? '：' + p.note : '')) : '這筆還款記錄';
  openConfirmModal('刪除還款', '確定刪除「' + detail + '」？刪除後信用卡欠款會增加，付款帳戶餘額會回補，也可能重新出現到期提醒。此操作不會回退分期已繳期數，需要的話請自行編輯分期。', () => {
    deleteWithFeedback('creditCardPayments', id, '已刪除還款');
  }, '刪除');
}

function handleInstallmentAmountInput() {
  const perEl = document.getElementById('instPerInstallment');
  if (!perEl || perEl.dataset.userEdited === '1') return;
  const totalAmount = parsePositiveInt(document.getElementById('instTotalAmount').value);
  const totalPeriods = parsePositiveInt(document.getElementById('instTotalPeriods').value);
  if (totalAmount === null || totalPeriods === null) return;
  perEl.value = Math.ceil(totalAmount / totalPeriods);
}

function readInstallmentFields() {
  const totalAmount = parsePositiveInt(document.getElementById('instTotalAmount').value);
  if (totalAmount === null) { showFieldError('instTotalAmount', '分期總額必須是正整數'); return null; }
  const totalPeriods = parsePositiveInt(document.getElementById('instTotalPeriods').value);
  if (totalPeriods === null) { showFieldError('instTotalPeriods', '總期數必須是正整數'); return null; }
  const perInstallment = parsePositiveInt(document.getElementById('instPerInstallment').value);
  if (perInstallment === null) { showFieldError('instPerInstallment', '每期金額必須是正整數'); return null; }
  const paidPeriods = parseAnyInt(document.getElementById('instPaidPeriods').value);
  if (paidPeriods === null || paidPeriods < 0) { showFieldError('instPaidPeriods', '已還期數必須是 0 或正整數'); return null; }
  if (paidPeriods > totalPeriods) { showFieldError('instPaidPeriods', '已還期數不能超過總期數'); return null; }
  return { note: document.getElementById('instNote').value.trim(), totalAmount, totalPeriods, perInstallment, paidPeriods };
}

function openInstallmentForm(cardId, editId) {
  const card = state.data.creditCards.find(c => c.id === cardId);
  if (!card) { showToast('找不到這張信用卡'); return; }
  const editRec = editId ? card.installments.find(i => i.id === editId) : null;
  if (editId && !editRec) { showToast('找不到這筆分期'); return; }
  openModal(editId ? '編輯分期' : '新增分期',
    '<div class="muted">卡片：' + escapeHtml(card.name) + '</div>' +
    installmentFieldsHtml(editRec) +
    '<button class="btn-primary" onclick="submitInstallment(\'' + cardId + '\'' + (editId ? ', \'' + editId + '\'' : '') + ')">儲存</button>' +
    modalCancelButton());
}

function submitInstallment(cardId, editId) {
  const fields = readInstallmentFields();
  if (!fields) return;
  const card = state.data.creditCards.find(c => c.id === cardId);
  const original = editId && card ? card.installments.find(i => i.id === editId) : null;
  const paidDates = original ? (original.paidDates || []) : [];
  if (fields.paidPeriods < paidDates.length) { showFieldError('instPaidPeriods', '已還期數不能少於已有日期記錄的期數'); return; }
  fields.paidDates = paidDates;
  if (!original) fields.date = todayLocalDate();
  const saved = editId
    ? updateInstallment(cardId, editId, fields)
    : addInstallment(cardId, fields);
  if (!saved) { showToast('儲存失敗（可能處於鎖定狀態或儲存空間問題），請到備份頁確認'); return; }
  closeModal();
  renderKeepScroll();
  revealRecord(saved.id);
  showToast(editId ? '已更新分期' : '已新增分期');
}

function handleDeleteInstallment(cardId, installmentId) {
  openConfirmModal('刪除分期', '確定刪除這筆分期記錄？刪除後，這筆分期剩餘本金會從信用卡總欠款中移除，但不會影響已存在的還款紀錄。', () => {
    const deleted = deleteInstallment(cardId, installmentId);
    if (!deleted) { showToast('刪除失敗（可能處於鎖定狀態或記錄已不存在），請到備份頁確認'); return; }
    renderKeepScroll();
    showToast('已刪除分期');
  }, '刪除');
}

function handleAdvanceInstallment(cardId, installmentId) {
  const card = state.data.creditCards.find(c => c.id === cardId);
  const inst = card && card.installments.find(i => i.id === installmentId);
  if (!inst || inst.paidPeriods >= inst.totalPeriods) return;
  const updated = updateInstallment(cardId, installmentId, { paidPeriods: inst.paidPeriods + 1, paidDates: (inst.paidDates || []).concat(todayLocalDate()) });
  if (!updated) { showToast('儲存失敗（可能處於鎖定狀態或儲存空間問題），請到備份頁確認'); return; }
  renderKeepScroll();
  revealRecord(installmentId);
  showToast('已更新分期進度' + (updated.paidPeriods >= updated.totalPeriods ? '，這筆分期已結清' : ''));
}

function handlePaymentMethodChange(idPrefix = 'tx', scopeOverride) {
  const method = document.getElementById(idPrefix + 'PaymentMethod').value;
  const scopeSelect = document.getElementById('qaScope');
  const hint = document.getElementById(idPrefix + 'PaymentHint');
  const scope = scopeOverride || (hint && hint.dataset.scope) || (idPrefix === 'qa' && scopeSelect ? scopeSelect.value : (idPrefix === 'edit' ? null : currentView));
  document.getElementById(idPrefix + 'AccountField').style.display = method === 'bankAccount' ? 'block' : 'none';
  document.getElementById(idPrefix + 'CardField').style.display = method === 'creditCard' ? 'block' : 'none';
  if (hint) {
    if (scope === 'family' && method === 'creditCard') {
      hint.textContent = '這筆家庭支出會形成「已刷卡待補款」，之後可從家庭基金補款到個人帳戶再繳信用卡。';
    } else if (scope === 'family' && method === 'bankAccount') {
      hint.textContent = '這筆會直接扣家庭基金現金餘額，也會影響選到的個人帳戶餘額。';
    } else if (method === 'creditCard') {
      hint.textContent = '這筆會增加信用卡欠款，還款時再從帳戶扣款。';
    } else {
      hint.textContent = '';
    }
    hint.style.display = hint.textContent ? 'block' : 'none';
  }
}

    showFieldError(id, msg);

function readTransactionFields(scope, idPrefix) {
  const amount = parsePositiveInt(document.getElementById(idPrefix + 'Amount').value);
  const date = document.getElementById(idPrefix + 'Date').value;
  const note = document.getElementById(idPrefix + 'Note').value.trim();
  const category = document.getElementById(idPrefix + 'Category').value;
  const paymentMethod = document.getElementById(idPrefix + 'PaymentMethod').value;
  if (amount === null) { transactionFormError(idPrefix, 'Amount', '金額必須是正整數'); return null; }
  if (!date) { transactionFormError(idPrefix, 'Date', '請選擇日期'); return null; }
  const record = { date, amount, note, category, scope, paymentMethod, accountId: null, cardId: null, billingMonth: null, cardStatus: null };
  if (paymentMethod === 'bankAccount') {
    const accountId = document.getElementById(idPrefix + 'AccountId').value;
    if (!accountId) { transactionFormError(idPrefix, 'AccountId', '請選擇銀行帳戶（如果沒有選項，請先到帳戶頁新增）'); return null; }
    record.accountId = accountId;
  }
  if (paymentMethod === 'creditCard') {
    const cardId = document.getElementById(idPrefix + 'CardId').value;
    if (!cardId) { transactionFormError(idPrefix, 'CardId', '請選擇信用卡（如果沒有選項，請先到信用卡頁新增）'); return null; }
    const card = state.data.creditCards.find(c => c.id === cardId);
    record.cardId = cardId;
    const bmEl = document.getElementById(idPrefix + 'BillingMonth');
    const manualBm = bmEl ? bmEl.value : '';
    if (manualBm) {
      if (!isValidYearMonth(manualBm)) { transactionFormError(idPrefix, 'BillingMonth', '帳單月份格式不正確'); return null; }
      record.billingMonth = manualBm;
    } else {
      record.billingMonth = getCardBillingMonth(card, date);
    }
    record.cardStatus = document.getElementById(idPrefix + 'CardStatus').value;
  }
  return record;
}

}

// 記錄清單月份篩選——純畫面狀態，不存進 state/localStorage，預設只看本月，避免清單越滾越長
let listFilters = {
  personal: { month: currentYearMonth(), showAll: false, payment: 'all', search: '' },
  family: { month: currentYearMonth(), showAll: false, payment: 'all', search: '' },
  familyEnvelope: { month: currentYearMonth(), showAll: false, source: 'all', search: '' },
  accountMovements: { month: currentYearMonth(), showAll: false, source: 'all', search: '' },
  cashWallet: { month: currentYearMonth(), showAll: false, source: 'all', search: '' },
  creditCardPayments: { month: currentYearMonth(), showAll: false, source: 'all', search: '' }
};

// 批次 T：日期組開合只保存在本次頁面 session，不寫入 state/localStorage 或備份。
const detailGroupOpenState = Object.create(null);

function detailGroupStateKey(pane, date) {
  return String(pane) + '\u0000' + String(date);
}

function transactionNewestFirst(a, b) {
  if (a.date !== b.date) return b.date.localeCompare(a.date);
  const createdCompare = (b.createdAt || '').localeCompare(a.createdAt || '');
  if (createdCompare !== 0) return createdCompare;
  return String(a.id).localeCompare(String(b.id));
}

function groupRecordsByDate(records, preserveOrder) {
  const ordered = preserveOrder ? [...records] : [...records].sort(transactionNewestFirst);
  const groups = [];
  ordered.forEach(record => {
    let group = groups[groups.length - 1];
    if (!group || group.date !== record.date) {
      group = { date: record.date, records: [] };
      groups.push(group);
    }
    group.records.push(record);
  });
  return groups;
}

function normalizedSearch(value) {
  return String(value || '').trim().toLocaleLowerCase();
}

function recordMatchesSearch(record, query, textBuilder) {
  const q = normalizedSearch(query);
  if (!q) return true;
  return normalizedSearch(textBuilder(record)).includes(q);
}

function paymentMethodSearchLabel(t) {
  if (t.paymentMethod === 'cash') return '現金';
  if (t.paymentMethod === 'bankAccount') {
    const account = state.data.bankAccounts.find(a => a.id === t.accountId);
    return '銀行帳戶 ' + (account ? account.name : '');
  }
  if (t.paymentMethod === 'creditCard') {
    const card = state.data.creditCards.find(c => c.id === t.cardId);
    return '信用卡 ' + (card ? card.name : '') + ' ' + (t.cardStatus || '');
  }
  return String(t.paymentMethod || '');
}

function transactionSearchText(t) {
  return [t.date, t.category, t.note, paymentMethodSearchLabel(t)].join(' ');
}

function ledgerSearchText(entry) {
  return [entry.date, entry.label, entry.title, entry.detail, entry.source, entry.kind].join(' ');
}

function detailGroupIsOpen(pane, date, index, forceOpen) {
  if (forceOpen) return true;
  const key = detailGroupStateKey(pane, date);
  return Object.prototype.hasOwnProperty.call(detailGroupOpenState, key) ? detailGroupOpenState[key] : index === 0;
}

function handleDetailGroupToggle(event, pane, date) {
  const el = event.currentTarget;
  if (!event.isTrusted) return;
  if (el.dataset.searchForced === 'true') {
    el.open = true;
    return;
  }
  detailGroupOpenState[detailGroupStateKey(pane, date)] = el.open;
}

function setVisibleDetailGroupsOpen(target, open, prefixMatch) {
  document.querySelectorAll('.detail-date-group').forEach(group => {
    const pane = group.dataset.detailPane || '';
    if ((prefixMatch && pane.startsWith(target)) || (!prefixMatch && pane === target)) {
      detailGroupOpenState[detailGroupStateKey(pane, group.dataset.detailDate)] = open;
    }
  });
  renderKeepScroll();
}

function renderDetailGroupActions(target, prefixMatch, disabled) {
  return '<div class="detail-group-actions" aria-label="日期分組操作">' +
    '<button type="button" onclick="setVisibleDetailGroupsOpen(\'' + target + '\',true,' + !!prefixMatch + ')"' + (disabled ? ' disabled title="搜尋期間會自動展開結果"' : '') + '>展開全部</button>' +
    '<button type="button" onclick="setVisibleDetailGroupsOpen(\'' + target + '\',false,' + !!prefixMatch + ')"' + (disabled ? ' disabled title="搜尋期間會自動展開結果"' : '') + '>收合全部</button></div>';
}

function renderDetailSearch(scope, label, matchCount, target, prefixMatch) {
  const f = listFilters[scope];
  const query = normalizedSearch(f.search);
  const id = 'detailSearch_' + scope;
  return '<div class="detail-search-row"><label for="' + id + '">' + escapeHtml(label) +
    '<input id="' + id + '" type="search" value="' + inputVal(f.search) + '" placeholder="輸入日期、分類、備註或來源" oninput="handleDetailSearchInput(\'' + scope + '\',\'' + id + '\')"></label>' +
    '<button type="button" class="btn-ghost" onclick="clearDetailSearch(\'' + scope + '\',\'' + id + '\')"' + (query ? '' : ' disabled') + '>清除</button></div>' +
    (query ? '<div class="detail-match-count" role="status">找到 ' + matchCount + ' 筆</div>' : '') +
    renderDetailGroupActions(target, prefixMatch, !!query);
}

function handleDetailSearchInput(scope, inputId) {
  const input = document.getElementById(inputId);
  listFilters[scope].search = input ? input.value : '';
  render();
  requestAnimationFrame(() => {
    const next = document.getElementById(inputId);
    if (!next) return;
    next.focus();
    const end = next.value.length;
    if (next.setSelectionRange) next.setSelectionRange(end, end);
  });
}

function clearDetailSearch(scope, inputId) {
  listFilters[scope].search = '';
  renderKeepScroll();
  requestAnimationFrame(() => {
    const input = document.getElementById(inputId);
    if (input) input.focus();
  });
}

function renderDetailEmpty(scope, message) {
  const hasSearch = !!normalizedSearch(listFilters[scope].search);
  return '<div class="detail-empty">' + escapeHtml(message) +
    (hasSearch ? '<br><button type="button" class="btn-ghost" onclick="clearDetailSearch(\'' + scope + '\',\'detailSearch_' + scope + '\')">清除搜尋</button>' : '') + '</div>';
}

function renderDateGroups(pane, records, itemHtml, summaryHtml, emptyHtml, routeClass, preserveOrder) {
  const forceOpen = !!normalizedSearch(pane.startsWith('account:') ? listFilters.accountMovements.search :
    pane.startsWith('envelope:') ? listFilters.familyEnvelope.search :
    pane.startsWith('card:') ? listFilters.creditCardPayments.search : listFilters[pane].search);
  const groups = groupRecordsByDate(records, preserveOrder);
  if (!groups.length) return emptyHtml;
  const bodyTag = routeClass === 'detail-personal' || routeClass === 'detail-family' ? 'ul' : 'div';
  return '<div class="detail-date-groups ' + routeClass + '">' + groups.map((group, index) => {
    const isOpen = detailGroupIsOpen(pane, group.date, index, forceOpen);
    return '<details class="detail-date-group" data-detail-pane="' + escapeHtml(pane) + '" data-detail-date="' + group.date + '" data-search-forced="' + forceOpen + '"' + (isOpen ? ' open' : '') +
      ' ontoggle="handleDetailGroupToggle(event,\'' + pane + '\',\'' + group.date + '\')">' +
      '<summary><span class="detail-date-main"><time datetime="' + group.date + '">' + group.date + '</time><span class="detail-date-count">' + group.records.length + ' 筆</span></span>' +
      '<span class="detail-date-total">' + summaryHtml(group.records) + '</span></summary>' +
      '<' + bodyTag + ' class="detail-date-body ' + (bodyTag === 'ul' ? 'list' : 'ledger-list') + '">' +
      group.records.map(itemHtml).join('') + '</' + bodyTag + '></details>';
  }).join('') + '</div>';
}

function renderListFilterBar(scope) {
  const f = listFilters[scope];
  return (
    '<div class="list-filter">' +
    '<input type="month" id="listMonth_' + scope + '" value="' + f.month + '" onchange="handleListFilterMonthChange(\'' + scope + '\')"' + (f.showAll ? ' disabled' : '') + '>' +
    '<label><input type="checkbox" id="listShowAll_' + scope + '"' + (f.showAll ? ' checked' : '') + ' onchange="handleListFilterShowAllChange(\'' + scope + '\')">顯示全部</label>' +
    '</div>'
  );
}

function handleListFilterMonthChange(scope) {
  listFilters[scope].month = document.getElementById('listMonth_' + scope).value;
  render();
}

function handleListFilterShowAllChange(scope) {
  listFilters[scope].showAll = document.getElementById('listShowAll_' + scope).checked;
  render();
}

function handleTransactionPaymentFilter(scope, payment) {
  listFilters[scope].payment = payment;
  renderKeepScroll();
}

function renderTransactionPaymentFilter(scope) {
  const selected = listFilters[scope].payment;
  return '<div><div class="detail-filter-label">付款方式</div><div class="detail-filter-chips" role="group" aria-label="付款方式快速篩選">' +
    [['all','全部'],['cash','現金'],['bankAccount','銀行'],['creditCard','信用卡']].map(option =>
      '<button type="button" aria-pressed="' + (selected === option[0]) + '" onclick="handleTransactionPaymentFilter(\'' + scope + '\',\'' + option[0] + '\')">' + option[1] + '</button>'
    ).join('') + '</div></div>';
}

function filterByListMonth(scope, records) {
  const f = listFilters[scope];
  if (f.showAll) return records;
  return records.filter(r => r.date.slice(0, 7) === f.month);
}

function emptyListMessage(scope, noun) {
  const showAll = listFilters[scope] && listFilters[scope].showAll;
  return showAll ? ('尚無' + noun) : ('這個月還沒有' + noun + '，可在上方新增');
}

function transactionListItemHtml(t, includeCategoryInMeta) {
  return '<li data-record-id="' + t.id + '"><div class="row"><span>' + escapeHtml(t.note || t.category) + '</span><span>' + money(t.amount) + '</span></div>' +
    '<div class="muted">' + t.date + (includeCategoryInMeta ? ' · ' + escapeHtml(t.category) : '') + ' · ' + paymentMethodLabel(t) + '</div>' +
    '<div class="action-row"><button class="btn-ghost" onclick="openEditTransaction(\'' + t.id + '\')">編輯</button>' +
    '<button class="btn-danger" onclick="handleDeleteTransaction(\'' + t.id + '\')">刪除</button></div></li>';
}

function renderPersonal() {
  const f = listFilters.personal;
  const monthRecords = filterByListMonth('personal', state.data.transactions.filter(t => t.scope === 'personal'));
  const paymentRecords = monthRecords.filter(t => f.payment === 'all' || t.paymentMethod === f.payment);
  const records = paymentRecords.filter(t => recordMatchesSearch(t, f.search, transactionSearchText));
  const list = renderDateGroups('personal', records, t => transactionListItemHtml(t, true),
    group => money(group.reduce((total, t) => total + t.amount, 0)),
    renderDetailEmpty('personal', normalizedSearch(f.search) ? '目前範圍找不到符合的個人記錄。' : emptyListMessage('personal', '記錄')),
    'detail-personal', false);

  const catTotals = personalCategoryTotals(currentYearMonth());
  const catRowsHtml = Object.entries(catTotals)
    .sort((a, b) => b[1] - a[1])
    .map(([cat, total]) => '<div class="row"><span>' + escapeHtml(cat) + '</span><span>' + money(total) + '</span></div>')
    .join('');

  return (
    '<div class="row"><h2>個人記帳</h2><span class="big">本月 ' + money(personalMonthlyTotal(currentYearMonth())) + '</span></div>' +
    renderTransactionForm('personal', 'handleSaveTransaction') +
    '<div class="card"><h2>本月類別支出</h2>' + (catRowsHtml || '<div class="muted">這個月還沒有記錄</div>') + '</div>' +
    '<div class="card"><h2>記錄</h2>' + renderListFilterBar('personal') +
    '<div class="detail-tools">' + renderTransactionPaymentFilter('personal') + renderDetailSearch('personal', '搜尋個人記錄', records.length, 'personal', false) + '</div>' + list + '</div>'
  );
}

function paymentMethodLabel(t) {
  if (t.paymentMethod === 'cash') return '現金';
  if (t.paymentMethod === 'bankAccount') {
    const a = state.data.bankAccounts.find(x => x.id === t.accountId);
    return '銀行帳戶' + (a ? '：' + escapeHtml(a.name) : '');
  }
  if (t.paymentMethod === 'creditCard') {
    const c = state.data.creditCards.find(x => x.id === t.cardId);
    return '信用卡' + (c ? '：' + escapeHtml(c.name) : '') + '（' + escapeHtml(t.cardStatus) + '）';
  }
  return escapeHtml(t.paymentMethod);
}

function transactionDeleteDetail(t) {
  if (!t) return '這筆記錄';
  return t.date + ' ' + (t.scope === 'family' ? '家庭' : '個人') + '支出 ' + money(t.amount) +
    '（' + (t.note || t.category || '未命名') + '）';
}

function handleSaveTransaction(scope) {
  const record = readTransactionForm(scope);
  if (!record) return;
  const saved = addRecord('transactions', record);
  render();
  revealRecord(saved && saved.id);
  showToast('已新增' + (scope === 'family' ? '家庭' : '個人') + '支出 ' + money(record.amount));
}

function handleDeleteTransaction(id) {
  const t = state.data.transactions.find(x => x.id === id);
  openConfirmModal('刪除記錄', '確定刪除「' + transactionDeleteDetail(t) + '」？刪除後相關餘額、欠款與提醒會重新計算。', () => {
    deleteWithFeedback('transactions', id, '已刪除記錄');
  }, '刪除');
}

function categoryOptionsHtml(selected) {
  return FAMILY_CATEGORIES.map(c => '<option' + optSelected(selected, c) + '>' + c + '</option>').join('');
}

function familyCategoryRecordId(category) {
  return 'familyFundCategory-' + FAMILY_CATEGORIES.indexOf(category);
}

function envelopeDeltaText(label, delta) {
  if (delta === 0) return label + ' －';
  return label + ' ' + signedMoney(delta);
}

function openFamilyEnvelopeSource(source, sourceId) {
  if (source === 'transactions') return openEditTransaction(sourceId);
  if (source === 'familyFundDeposits') return openEditDeposit(sourceId);
  if (source === 'familyFundReimbursements') return openEditReimbursement(sourceId);
  showToast('找不到這筆信封流水的原始記錄');
}

function envelopeLedgerSourceMatches(entry, source) {
  if (!source || source === 'all') return true;
  if (source === 'deposit') return entry.kind === 'familyDeposit' || (entry.kind === 'familyCash' && entry.label === '對帳調整');
  if (source === 'cash') return (entry.kind === 'familyCash' && entry.label !== '對帳調整') || entry.kind === 'familyBank';
  if (source === 'card') return entry.kind === 'familyCard';
  if (source === 'reimbursement') return entry.kind === 'familyReimbursement';
  return false;
}

function filterFamilyEnvelopeLedgerEntries(category) {
  const f = listFilters.familyEnvelope;
  const scoped = familyEnvelopeLedgerEntries(category).filter(entry =>
    (f.showAll || entry.date.slice(0, 7) === f.month) && envelopeLedgerSourceMatches(entry, f.source)
  );
  return scoped.filter(entry => recordMatchesSearch(entry, f.search, ledgerSearchText));
}

function handleFamilyEnvelopeSourceChange() {
  listFilters.familyEnvelope.source = document.getElementById('familyEnvelopeSource').value;
  renderKeepScroll();
}

function renderFamilyEnvelopeFilterBar() {

  return '<div class="card"><h2>信封流水篩選</h2>' + renderListFilterBar('familyEnvelope') +
    '<div class="ledger-filter"><label>流水來源<select id="familyEnvelopeSource" onchange="handleFamilyEnvelopeSourceChange()">' +
    '<option value="all"' + optSelected(f.source, 'all') + '>全部</option>' +
    '<option value="deposit"' + optSelected(f.source, 'deposit') + '>存入／調整</option>' +
    '<option value="cash"' + optSelected(f.source, 'cash') + '>現金／銀行支出</option>' +
    '<option value="card"' + optSelected(f.source, 'card') + '>信用卡支出</option>' +
    '<option value="reimbursement"' + optSelected(f.source, 'reimbursement') + '>補款</option>' +

function renderFamilyEnvelopeLedger(category) {

function depositAccountOptionsHtml(selected) {
  return '<option value=""' + (selected == null ? ' selected' : '') + '>現金存入（不影響銀行帳戶）</option>' +
    state.data.bankAccounts.map(a => '<option value="' + a.id + '"' + optSelected(selected, a.id) + '>' +
      escapeHtml(a.name) + '（目前 ' + money(bankAccountBalance(a.id)) + '）</option>').join('');
}

function depositImpactPreviewHtml(prefix, editId) {
  const amountEl = document.getElementById(prefix + 'Amount');
  const categoryEl = document.getElementById(prefix + 'Category');
  const accountEl = document.getElementById(prefix + 'Account');
  if (!amountEl || !categoryEl || !accountEl) return '';
  const amount = parsePositiveInt(amountEl.value);
  const category = categoryEl.value;
  const accountId = accountEl.value || null;
  const original = editId ? state.data.familyFundDeposits.find(d => d.id === editId) : null;
  if (amount === null || FAMILY_CATEGORIES.indexOf(category) === -1) {
    return '<div class="muted">輸入有效金額後，這裡會預覽銀行帳戶與家庭信封的變化。</div>';
  }

  let envelopeBefore = familyFundCashBalanceByCategory(category);
  if (original && original.category === category) envelopeBefore -= original.amount;
  let html = '';
  if (original && original.category !== category) {
    const oldEnvelopeCurrent = familyFundCashBalanceByCategory(original.category);
    html += '<div class="row"><span>原信封 ' + escapeHtml(original.category) + '</span><span>' + money(oldEnvelopeCurrent) + ' → ' + money(oldEnvelopeCurrent - original.amount) + '</span></div>';
  }
  html += '<div class="row"><span>' + escapeHtml(category) + '信封</span><span>' + money(envelopeBefore) + ' → ' + money(envelopeBefore + amount) + '</span></div>';

  if (original && original.fromAccountId && original.fromAccountId !== accountId) {
    const oldAccount = state.data.bankAccounts.find(a => a.id === original.fromAccountId);
    if (oldAccount) {
      const oldCurrent = bankAccountBalance(oldAccount.id);
      html += '<div class="row"><span>原來源 ' + escapeHtml(oldAccount.name) + '</span><span>' + money(oldCurrent) + ' → ' + money(oldCurrent + original.amount) + '</span></div>';
    }
  }
  if (accountId) {
    const account = state.data.bankAccounts.find(a => a.id === accountId);
    if (account) {
      let bankBefore = bankAccountBalance(accountId);
      if (original && original.fromAccountId === accountId) bankBefore += original.amount;
      html += '<div class="row"><span>' + escapeHtml(account.name) + '</span><span>' + money(bankBefore) + ' → ' + money(bankBefore - amount) + '</span></div>';
    }
  } else {
    html += '<div class="muted">現金存入，不影響銀行帳戶。</div>';
  }
  return html;
}

function updateDepositImpactPreview(prefix, editId) {

  if (host) host.innerHTML = depositImpactPreviewHtml(prefix, editId || null);
}

function renderFamilyFund() {
  const accountOptions = state.data.bankAccounts.map(a => '<option value="' + a.id + '">' + escapeHtml(a.name) + '</option>').join('');

  const depositsHtml = [...state.data.familyFundDeposits]
    .sort((a, b) => b.date.localeCompare(a.date))
    .map(d => { const sourceAcc = state.data.bankAccounts.find(a => a.id === d.fromAccountId); return '<li data-record-id="' + d.id + '"><div class="row"><span>' + escapeHtml(d.depositedBy) + ' 存入 ' + escapeHtml(d.category) + '</span><span>' + money(d.amount) + '</span></div><div class="muted">' + d.date + ' · ' + (sourceAcc ? '由 ' + escapeHtml(sourceAcc.name) + ' 轉出' : '現金存入（不影響銀行）') + '</div>' +
      '<div class="action-row"><button class="btn-ghost" onclick="openEditDeposit(\'' + d.id + '\')">編輯</button>' +
      '<button class="btn-danger" onclick="handleDeleteDeposit(\'' + d.id + '\')">刪除</button></div></li>'; })
    .join('');

  const reimbHtml = [...state.data.familyFundReimbursements]
    .sort((a, b) => b.date.localeCompare(a.date))
    .map(r => {

    '<label>類別（要存進哪個信封）</label><select id="depositCategory" onchange="updateDepositImpactPreview(\'deposit\')">' + categoryOptionsHtml('家用') + '</select>' +
    '<label>金額</label><input id="depositAmount" type="number" inputmode="numeric" min="1" oninput="updateDepositImpactPreview(\'deposit\')">' +

function renderFamilyExpenseList() {
  const f = listFilters.family;
  const monthRecords = filterByListMonth('family', state.data.transactions.filter(t => t.scope === 'family'));
  const paymentRecords = monthRecords.filter(t => f.payment === 'all' || t.paymentMethod === f.payment);
  const records = paymentRecords.filter(t => recordMatchesSearch(t, f.search, transactionSearchText));
  const list = renderDateGroups('family', records, t =>
    '<li data-record-id="' + t.id + '"><div class="row"><span>' + escapeHtml(t.category) + '：' + escapeHtml(t.note) + '</span><span>' + money(t.amount) + '</span></div>' +
    '<div class="muted">' + t.date + ' · ' + paymentMethodLabel(t) + '</div>' +
    '<div class="action-row"><button class="btn-ghost" onclick="openEditTransaction(\'' + t.id + '\')">編輯</button>' +
    '<button class="btn-danger" onclick="handleDeleteTransaction(\'' + t.id + '\')">刪除</button></div></li>',
    group => money(group.reduce((total, t) => total + t.amount, 0)),
    renderDetailEmpty('family', normalizedSearch(f.search) ? '目前範圍找不到符合的家庭支出。' : emptyListMessage('family', '記錄')),
    'detail-family', false);
  return renderListFilterBar('family') + '<div class="detail-tools">' +
    renderTransactionPaymentFilter('family') + renderDetailSearch('family', '搜尋家庭支出', records.length, 'family', false) +
    '</div>' + list;
}

function handleAddDeposit() {
  const amount = parsePositiveInt(document.getElementById('depositAmount').value);
  const date = document.getElementById('depositDate').value;
  const depositedBy = document.getElementById('depositBy').value.trim();
  const category = document.getElementById('depositCategory').value;
  const fromAccountId = document.getElementById('depositAccount').value || null;
  if (amount === null) { showFieldError('depositAmount', '金額必須是正整數'); return; }
  if (!date) { showFieldError('depositDate', '請選擇日期'); return; }
  if (!depositedBy) { showFieldError('depositBy', '請選擇或輸入存入人'); return; }
  if (FAMILY_CATEGORIES.indexOf(category) === -1) { showFieldError('depositCategory', '請選擇有效的家庭信封'); return; }
  const saved = addRecord('familyFundDeposits', { date, amount, depositedBy, category, fromAccountId });
  if (!saved) { showToast('儲存失敗（可能處於鎖定狀態或儲存空間問題），請到備份頁確認'); return; }
  const sourceAccount = fromAccountId ? state.data.bankAccounts.find(a => a.id === fromAccountId) : null;
  render();
  revealRecord(saved.id);
  showToast('已存入' + category + ' ' + money(amount) + (sourceAccount ? '，並由' + sourceAccount.name + '扣除相同金額' : '，未影響銀行帳戶'));
}

function submitEditDeposit(id) {

let quickReimbCategory = null;

function openQuickReimbursement(category, cardId) {
  if (FAMILY_CATEGORIES.indexOf(category) === -1) { showToast('找不到這個家庭基金分類'); return; }
  quickReimbCategory = category;
  const defaultMethod = state.data.bankAccounts.length > 0 ? 'bankAccount' : 'cash';
  const cardOptions = '<option value="">（未指定）</option>' + state.data.creditCards.map(c =>
    '<option value="' + c.id + '"' + optSelected(cardId, c.id) + '>' + escapeHtml(c.name) + '</option>'
  ).join('');
  const accountOptions = state.data.bankAccounts.map(a => '<option value="' + a.id + '">' + escapeHtml(a.name) + '</option>').join('');
  const remaining = quickReimbRemaining(category, cardId);
  openModal('記錄補款',
    '<div class="label">補款信封</div><h2>' + escapeHtml(category) + '</h2>' +
    '<label>關聯信用卡（選填）</label><select id="qrCard" onchange="updateQuickReimbursementPreview()">' + cardOptions + '</select>' +
    '<label>補款方式</label><select id="qrMethod" onchange="handleReimbursementMethodChange(\'qr\')"><option value="bankAccount"' + optSelected(defaultMethod, 'bankAccount') + '>轉入個人帳戶</option><option value="cash"' + optSelected(defaultMethod, 'cash') + '>現金結清</option></select>' +
    '<div id="qrAccountWrap"' + (defaultMethod === 'cash' ? ' style="display:none"' : '') + '><label>撥入帳戶</label><select id="qrAccount" onchange="updateQuickReimbursementPreview()">' + accountOptions + '</select></div>' +
    '<label>金額</label><input id="qrAmount" type="number" min="1" inputmode="numeric" oninput="updateQuickReimbursementPreview()">' +
    '<div class="action-row"><button id="qrFull" class="btn-secondary" onclick="fillQuickReimbursementFull()"' + (remaining <= 0 ? ' disabled' : '') + '>全部補清</button><span id="qrFullHint" class="muted">' + (remaining <= 0 ? '目前沒有待補金額' : '可補 ' + money(remaining)) + '</span></div>' +
    '<label>日期</label><input id="qrDate" type="date" value="' + todayLocalDate() + '">' +
    '<label>備注（選填）</label><input id="qrNote">' +
    '<div id="qrPreview" aria-live="polite"></div>' +
    '<div class="muted" style="margin-top:8px">補款是家庭基金結清代墊，不是繳信用卡；實際繳卡請到信用卡頁記還款。</div>' +
    '<button class="btn-primary" onclick="submitQuickReimbursement()">儲存補款</button>' + modalCancelButton()
  );
}

function selectedQuickReimbursementCardId() {
  const card = document.getElementById('qrCard');
  return card && card.value ? card.value : null;
}

function fillQuickReimbursementFull() {
  const amount = quickReimbRemaining(quickReimbCategory, selectedQuickReimbursementCardId());
  if (amount <= 0) return;
  document.getElementById('qrAmount').value = amount;
  updateQuickReimbursementPreview();
}

function updateQuickReimbursementPreview() {
  const preview = document.getElementById('qrPreview');
  if (!preview || quickReimbCategory == null) return;
  const cardId = selectedQuickReimbursementCardId();
  const remaining = quickReimbRemaining(quickReimbCategory, cardId);
  const fullButton = document.getElementById('qrFull');
  const fullHint = document.getElementById('qrFullHint');
  if (fullButton) fullButton.disabled = remaining <= 0;
  if (fullHint) fullHint.textContent = remaining <= 0 ? '目前沒有待補金額' : '可補 ' + money(remaining);
  const amount = parsePositiveInt(document.getElementById('qrAmount').value);
  if (amount === null) { preview.innerHTML = ''; return; }
  const method = document.getElementById('qrMethod').value === 'cash' ? 'cash' : 'bankAccount';
  const accountId = document.getElementById('qrAccount').value;
  const account = state.data.bankAccounts.find(a => a.id === accountId);
  const card = state.data.creditCards.find(c => c.id === cardId);
  const cashBefore = familyFundCashBalanceByCategory(quickReimbCategory);
  const bankLine = method === 'cash'
    ? '銀行帳戶：不影響任何銀行帳戶'
    : '銀行帳戶：' + (account ? escapeHtml(account.name) + '：' + money(bankAccountBalance(account.id)) + ' → ' + money(bankAccountBalance(account.id) + amount) : '請選擇撥入帳戶');
  const pendingLabel = card ? escapeHtml(card.name) + ' 待補' : escapeHtml(quickReimbCategory) + ' 待補';
  const overHtml = amount > remaining
    ? '<div class="alert-due" style="margin-top:10px">這筆補款超過目前待補金額，會變成超額補款<label><input id="qrOverConfirm" type="checkbox">我確認要超額補款</label></div>'
    : '';
  preview.innerHTML = '<div class="reimb-impact"><div class="label">儲存後的帳務影響</div>' +
    '<div class="row"><span>家庭基金「' + escapeHtml(quickReimbCategory) + '」現金</span><span>' + money(cashBefore) + ' → ' + money(cashBefore - amount) + '</span></div>' +
    '<div class="row"><span>' + bankLine + '</span></div>' +
    '<div class="row"><span>' + pendingLabel + '</span><span>' + money(remaining) + ' → ' + money(remaining - amount) + '</span></div>' +
    '<div class="row"><span>信用卡欠款</span><b>不變（補款不是繳卡）</b></div></div>' + overHtml;
}

function submitQuickReimbursement() {
  const amount = parsePositiveInt(document.getElementById('qrAmount').value);
  const date = document.getElementById('qrDate').value;
  const method = document.getElementById('qrMethod').value === 'cash' ? 'cash' : 'bankAccount';
  const toAccountId = method === 'cash' ? null : document.getElementById('qrAccount').value;
  const cardId = selectedQuickReimbursementCardId();
  if (amount === null) { showFieldError('qrAmount', '金額必須是正整數'); return; }
  if (!date) { showFieldError('qrDate', '請選擇日期'); return; }
  if (method === 'bankAccount' && !toAccountId) { showFieldError('qrAccount', '請選擇撥入帳戶'); return; }
  if (amount > quickReimbRemaining(quickReimbCategory, cardId)) {
    const confirmBox = document.getElementById('qrOverConfirm');
    if (!confirmBox || !confirmBox.checked) { showFieldError('qrAmount', '請先勾選確認超額補款'); return; }
  }
  const note = document.getElementById('qrNote').value.trim();
  const saved = addRecord('familyFundReimbursements', { date, amount, category: quickReimbCategory, method, toAccountId, cardId, note });
  if (!saved) { showToast('儲存失敗（可能處於鎖定狀態或儲存空間問題），請到備份頁確認'); return; }
  const category = quickReimbCategory;
  const card = state.data.creditCards.find(c => c.id === cardId);
  const cardRemaining = cardId == null ? null : quickReimbRemaining(category, cardId);
  const aggregateRemaining = familyFundPendingReimbursementByCategory(category);
  closeModal();
  renderKeepScroll();
  revealRecord(saved.id);
  showToast('已補款 ' + money(amount) + '（' + category + '／' + (card ? card.name : (method === 'cash' ? '現金結清' : '未指定信用卡')) + '）；此分類剩餘待補 ' + money(aggregateRemaining) + (card ? '，該卡剩餘 ' + money(cardRemaining) : ''));
}

function handleAddReimbursement() {
  const amount = parsePositiveInt(document.getElementById('reimbAmount').value);
  const date = document.getElementById('reimbDate').value;
  const category = document.getElementById('reimbCategory').value;
  const rawMethod = document.getElementById('reimbMethod').value;
  const method = rawMethod === 'cash' ? 'cash' : 'bankAccount';
  const toAccountId = method === 'cash' ? null : document.getElementById('reimbAccount').value;
  const cardId = document.getElementById('reimbCard').value || null;
  const note = document.getElementById('reimbNote').value.trim();
  if (amount === null) { showFieldError('reimbAmount', '金額必須是正整數'); return; }
  if (!date) { showFieldError('reimbDate', '請選擇日期'); return; }
  if (method === 'bankAccount' && !toAccountId) { showFieldError('reimbAccount', '請選擇撥入帳戶'); return; }
  const saved = addRecord('familyFundReimbursements', { date, amount, category, method, toAccountId, cardId, note });
  render();
  revealRecord(saved && saved.id);
  showToast(method === 'cash'

}

  const ym = currentYearMonth();
  const accountsHtml = state.data.bankAccounts.map(a =>
    '<div class="metric-row"><span>' + escapeHtml(a.name) + '</span><span class="metric-value">' + money(bankAccountBalance(a.id)) + '</span></div>'
  ).join('') || '<div class="muted">尚無帳戶，先新增第一個</div>';

  const totalCardOwed = state.data.creditCards.reduce((total, c) => total + creditCardTotalOwed(c.id), 0);
  const cashSummary = state.data.cashWallet
    ? '<div class="big metric-value' + (cashWalletBalance() < 0 ? ' neg' : '') + '">' + money(cashWalletBalance()) + '</div>'
    : '<div class="muted">尚未設定</div>';
  const cardReminders = state.data.creditCards
    .map(c => ({ card: c, reminder: cardPaymentReminder(c) }))
    .filter(item => item.reminder.level !== 'none');
  const cardsHtml = state.data.creditCards.length === 0
    ? '<div class="muted">尚無信用卡，先新增第一張</div>'
    : '<div class="metric-row"><span>總欠款</span><span class="big metric-value">' + money(totalCardOwed) + '</span></div>' +
      (cardReminders.length
        ? cardReminders.map(item =>
            '<div class="' + (item.reminder.level === 'overdue' ? 'alert-overdue' : 'alert-due') + '">' +
            escapeHtml(item.card.name) + '：' +
            (item.reminder.level === 'overdue' ? '已逾期' : '即將到期') + '，' +
            formatDateShort(item.reminder.dueDate) + ' 前要處理，截至本期尚未還款 ' + money(item.reminder.amount) +
            '</div>'
          ).join('')
        : '<div class="muted">無待繳提醒</div>');

  const familyRows = FAMILY_CATEGORIES.map(cat => {
    const est = familyFundEstimatedBalanceByCategory(cat);
    return '<div class="metric-row"><span>' + escapeHtml(cat) + '</span><span class="metric-value' + (est < 0 ? ' neg' : '') + '">' + money(est) + '</span></div>';
  }).join('');

  return (
    '<section class="overview-hero" aria-labelledby="overviewHeroTitle">' +
      '<p class="hero-kicker">本月家庭資金狀態</p>' +
      '<h1 class="hero-title" id="overviewHeroTitle">沿著路線，看懂家的每一筆錢。</h1>' +
      '<div class="hero-summary"><div><div class="label" style="color:#d6e0e2">銀行總資產</div><div class="big hero-amount">' + money(bankAccountsTotalAssets()) + '</div></div>' +
      '<div class="hero-secondary">本月個人支出<strong>' + money(personalMonthlyTotal(ym)) + '</strong></div></div>' +
      '<button class="btn-primary quick-add" onclick="openQuickAdd()">' + iconHtml('quickAdd') + '<span>快速記帳</span></button>' +
    '</section>' + backupReminderBannerHtml() +
    '<section class="money-map" aria-labelledby="moneyMapTitle">' +
      '<div class="money-map-title"><h2 id="moneyMapTitle">家庭資金路線</h2><span class="muted">沿著站點查看與處理</span></div>' +
      '<div class="route-rails" aria-hidden="true"></div>' +
      '<div class="card tab-personal metro-station station-personal"><div class="station-head"><div class="station-heading">' + iconHtml('personal') + '<div><div class="label">個人站</div><h2>本月個人支出</h2></div></div><button class="btn-ghost station-link" onclick="handleGoToView(\'personal\')">查看明細 ›</button></div><div class="big">' + money(personalMonthlyTotal(ym)) + '</div></div>' +
      '<div class="card tab-account metro-station station-account"><div class="station-head"><div class="station-heading">' + iconHtml('bankAccounts') + '<div><div class="label">銀行站</div><h2>個人銀行帳戶</h2></div></div><button class="btn-ghost station-link" onclick="handleGoToView(\'bankAccounts\')">查看明細 ›</button></div>' + accountsHtml +
        '<div class="metric-row"><b>總資產</b><b class="metric-value">' + money(bankAccountsTotalAssets()) + '</b></div></div>' +
      '<div class="card tab-account metro-station station-account"><div class="station-head"><div class="station-heading">' + iconHtml('bankAccounts') + '<div><div class="label">現金站</div><h2>個人現金錢包</h2></div></div><button class="btn-ghost station-link" onclick="routeToView(\'cashWallet\');render()">前往現金 ›</button></div>' + cashSummary + '</div>' +
      '<div class="card tab-family metro-station station-family"><div class="station-head"><div class="station-heading">' + iconHtml('family') + '<div><div class="label">家庭站</div><h2>家庭基金（各信封預估餘額）</h2></div></div><button class="btn-ghost station-link" onclick="handleGoToView(\'family\')">查看明細 ›</button></div>' + familyRows + '</div>' +
      '<div class="card tab-credit metro-station station-credit"><div class="station-head"><div class="station-heading">' + iconHtml('creditCards') + '<div><div class="label">信用卡站</div><h2>待繳與到期狀態</h2></div></div><button class="btn-ghost station-link" onclick="handleGoToView(\'creditCards\')">查看明細 ›</button></div>' + cardsHtml + '</div>' +
    '</section>'
  );
}

// ===================== 9. UI：備份還原 =====================
function renderBackup() {
  if (stateBlocked) {
    return (
      '<div class="card"><h2>備份還原</h2>' +
      '<p class="neg"><b>目前處於鎖定狀態</b>：偵測到本機資料版本不相容或已損毀，畫面上顯示的是空白資料，不是你真正的資料，一般匯出功能已停用（避免匯出空檔案讓你誤以為備份成功）。</p>' +
      '<p class="muted">請按「救援匯出」，會把手機裡原始存的內容原封不動下載下來（不經過畫面解析），可以拿去找人協助排查，或確認格式後手動修正再匯入。</p>' +
      '<button class="btn-danger" onclick="handleRescueExport()">救援匯出（原始資料）</button>' +
      '<label style="margin-top:14px">匯入正確版本的備份檔</label>' +
      '<input type="file" id="importFile" accept="application/json" onchange="handleImport(event)">' +
      '</div>'
    );
  }
  const last = state.lastBackupAt ? new Date(state.lastBackupAt).toLocaleString('zh-TW') : '從未備份';
  return (
    '<div class="card"><h2>備份還原</h2>' +
    '<div class="muted">上次備份：' + last + (storageAvailable ? '' : '　<span class="neg">（本機儲存目前無法使用，請盡快匯出）</span>') + '</div>' +
    '<button class="btn-primary" onclick="handleExport()">匯出備份（JSON）</button>' +
    '<label style="margin-top:14px">匯入備份檔</label>' +
    '<input type="file" id="importFile" accept="application/json" onchange="handleImport(event)">' +
    '</div>'
  );
}

function downloadJsonText(text, filename) {
  const blob = new Blob([text], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function handleExport() {
  if (isInTestMode()) {
    if (!confirm('目前是測試資料模式，匯出的會是假資料，不是你的真實備份。確定要繼續匯出嗎？')) return;
  } else {
    state.lastBackupAt = nowIso();
    state.backupReminderSnoozedUntil = null;
    saveState();
  }
  downloadJsonText(JSON.stringify(state, null, 2), 'family-budget-backup-' + todayLocalDate() + '.json');
  render();
}

function handleRescueExport() {
  let raw = null;
  try {
    raw = localStorage.getItem(STORAGE_KEY);
  } catch (e) {
    alert('連讀取原始資料都失敗了，可能是瀏覽器完全封鎖了本機儲存功能。');
    return;
  }
  if (!raw) {
    alert('本機沒有找到任何原始資料可以救援。');
    return;
  }
  downloadJsonText(raw, 'family-budget-RESCUE-' + todayLocalDate() + '.json');
}

function backupSummaryText(importState) {
  const data = importState.data || {};
  return '備份摘要：更新時間 ' + (importState.updatedAt ? new Date(importState.updatedAt).toLocaleString('zh-TW') : '未知') +
    '；交易 ' + (data.transactions || []).length +
    ' 筆、帳戶 ' + (data.bankAccounts || []).length +
    ' 個、信用卡 ' + (data.creditCards || []).length +
    ' 張、家庭基金存入 ' + (data.familyFundDeposits || []).length +
    ' 筆、補款 ' + (data.familyFundReimbursements || []).length +
    ' 筆、對帳 ' + (data.monthlyReconciliation || []).length + ' 筆。';
}

// id 必須符合 genId() 產生的安全字元集（英數字），避免匯入的資料帶有引號等字元
// 破壞畫面上用字串拼接組出來的 inline onclick
function isValidId(id) {
  return typeof id === 'string' && id.length > 0 && id.length < 64 && /^[a-z0-9]+$/i.test(id);
}

function handleImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function () {
    let parsed;
    try {
      parsed = JSON.parse(reader.result);
    } catch (e) {
      alert('這個檔案不是有效的 JSON 備份檔。');
      return;
    }
    const result = deepValidateAndMigrate(parsed);
    if (result.error) {
      alert('這份備份檔無法匯入（' + result.error + '）。為避免匯入後畫面出錯或帳務算錯，已阻擋。');
      return;
    }
    openConfirmModal('匯入備份', backupSummaryText(result.state) + ' 匯入會覆蓋目前所有資料，確定要繼續嗎？', () => {
      restoreState(result.state); // 用 restoreState 而不是直接改 state，才會正確解除任務 1 的鎖定狀態
      showToast('匯入成功');
      render();
    }, '匯入');
  };
  reader.readAsText(file);
}

function handleJumpToProblem(jump, id) {
  closeModal();
  routeToView(jump);
  render();
  if (id) revealRecord(id);
}

function renderWrappedText(text, size) {
  const chars = Array.from(String(text || ''));
  const chunks = [];
  for (let i = 0; i < chars.length; i += size) {
    chunks.push(chars.slice(i, i + size).join(''));
  }
  return chunks.map(escapeHtml).join('<br>');
}

function renderProblemItem(p) {
  const idArg = p.id ? ', \'' + p.id + '\'' : '';
  return (
    '<li class="problem-item"><div class="problem-type">' + escapeHtml(p.type) + '</div><div class="problem-desc">' + renderWrappedText(p.desc, 22) + '</div>' +
    '<button class="btn-ghost problem-action" onclick="handleJumpToProblem(\'' + p.jump + '\'' + idArg + ')">前往</button></li>'
  );
}

function renderDataCheck() {
  const orphanProblems = checkOrphanAndAmounts();
  const healthProblems = checkHealthAnomalies();
  const allProblems = orphanProblems.concat(healthProblems);
  const problemsHtml = allProblems.length
    ? '<ul class="list">' + allProblems.map(renderProblemItem).join('') + '</ul>'
    : '<div class="muted">檢查完成，沒有發現異常。</div>';
  const testModeBlock = stateBlocked
    ? '<div class="muted">目前處於鎖定狀態，無法使用測試資料模式。</div>'
    : (isInTestMode()
      ? '<button class="btn-danger" onclick="handleExitTestMode()">退出測試模式</button>'
      : '<button class="btn-secondary" onclick="handleEnterTestMode()">進入測試模式</button>');

  return (
    '<div class="card"><h2>資料健康度檢查</h2>' +
    problemsHtml +
    '</div>' +
    '<div class="card"><h2>測試資料模式</h2>' +
    '<div class="muted">載入一批假資料熟悉功能，不影響真實資料，<br>隨時可退出還原。</div>' +
    testModeBlock +
    '</div>'
  );
}

let reportsViewMonth = null;

function handleReportsMonthChange() {
  const value = document.getElementById('reportsViewMonth').value;
  reportsViewMonth = isValidYearMonth(value) ? value : null;
  render();
}

function reportBarPercent(amount, maximum) {
  if (maximum <= 0) return 0;
  return Math.max(0, Math.min(100, amount / maximum * 100));
}

function renderReportRankingList(items, kind, emptyText) {
  if (items.length === 0) return '<div class="muted">' + emptyText + '</div>';
  const maximum = items[0].amount;
  return '<div class="report-list">' + items.map(item => (
    '<div class="report-item">' +
      '<div class="report-item-head"><span>' + escapeHtml(item.category) + '</span><span>' + money(item.amount) + '</span></div>' +
      '<div class="report-bar-track" aria-hidden="true"><div class="report-bar report-bar-' + kind + '" style="width:' + reportBarPercent(item.amount, maximum) + '%"></div></div>' +
    '</div>'
  )).join('') + '</div>';
}

function renderReportTrend(trend, endYearMonth) {
  const maximum = trend.reduce((max, item) => Math.max(max, item.total), 0);
  const endYear = endYearMonth.slice(0, 4);
  const rows = trend.map(item => {
    const label = item.ym.slice(0, 4) === endYear ? Number(item.ym.slice(5, 7)) + '月' : item.ym;
    const bars = maximum > 0
      ? '<div class="report-bar report-bar-personal" style="width:' + reportBarPercent(item.personal, maximum) + '%"></div>' +
        '<div class="report-bar report-bar-family" style="width:' + reportBarPercent(item.family, maximum) + '%"></div>'
      : '';
    return '<div class="report-trend-row">' +
      '<span class="report-trend-label">' + label + '</span>' +
      '<div class="report-bar-track" aria-hidden="true">' + bars + '</div>' +
      '<span class="report-trend-value">' + money(item.total) + '</span>' +
    '</div>';
  }).join('');
  return (maximum > 0 ? '' : '<div class="muted" style="margin-bottom:10px">最近六個月沒有交易。</div>') +
    '<div class="report-trend-list">' + rows + '</div>';
}

function renderReports() {
  const ym = reportsViewMonth || currentYearMonth();
  const summary = reportSummary(ym);
  const rankings = reportCategoryRanking(ym);
  const trend = reportSixMonthTrend(ym);
  return (
    '<h2>報表</h2>' +
    '<div class="card"><div class="report-filter">' +
      '<div><label for="reportsViewMonth">查看月份</label><input id="reportsViewMonth" type="month" value="' + ym + '" onchange="handleReportsMonthChange()"></div>' +
      '<button class="btn-ghost" onclick="reportsViewMonth=null;render()">回到本月</button>' +
    '</div><div class="muted" style="margin-top:8px">正在查看 ' + ym + '</div></div>' +
    '<div class="card"><h2>月支出摘要</h2>' +
      '<div class="metric-row"><span>個人</span><span class="metric-value">' + money(summary.personal) + '</span></div>' +
      '<div class="metric-row"><span>家庭</span><span class="metric-value">' + money(summary.family) + '</span></div>' +
      '<div class="metric-row"><b>合計</b><span class="big metric-value">' + money(summary.total) + '</span></div>' +
    '</div>' +
    '<div class="card"><h2>分類排行</h2>' +
      '<div class="report-section"><h3 class="report-section-title">個人分類</h3>' + renderReportRankingList(rankings.personal, 'personal', '這個月沒有個人交易。') + '</div>' +
      '<div class="report-section"><h3 class="report-section-title">家庭分類</h3>' + renderReportRankingList(rankings.family, 'family', '這個月沒有家庭交易。') + '</div>' +
    '</div>' +
    '<div class="card"><h2>最近六個月趨勢</h2>' +
      '<div class="report-legend"><span class="report-legend-item"><span class="report-legend-swatch report-bar-personal"></span>個人</span>' +
      '<span class="report-legend-item"><span class="report-legend-swatch report-bar-family"></span>家庭</span></div>' +
      renderReportTrend(trend, ym) +
    '</div>'
  );
}

const MORE_MENU_ITEMS = [
  { key: 'creditCards', label: '信用卡', desc: '卡片、還款、分期、對帳', render: renderCreditCards, accent: 'credit', icon: 'creditCards' },
  { key: 'bankAccounts', label: '銀行帳戶', desc: '餘額、異動、帳戶對帳', render: renderBankAccounts, accent: 'account', icon: 'bankAccounts' },
  { key: 'reports', label: '報表', desc: '月支出摘要、分類排行、六個月趨勢', render: renderReports, accent: 'neutral', icon: 'reports' },
  { key: 'dataCheck', label: '資料自查', desc: '檢查孤兒資料、異常金額、測試資料', render: renderDataCheck, accent: 'neutral', icon: 'dataCheck' },
  { key: 'backup', label: '備份與還原', desc: '匯出、匯入、救援備份', render: renderBackup, accent: 'neutral', icon: 'backup' },
  { key: 'settings', label: '設定', desc: '銀行清單與分類關鍵字', render: renderSettings, accent: 'neutral', icon: 'settings' }
];
const CASH_MENU_ITEM = { key: 'cashWallet', label: '現金', desc: '餘額、流水、手動異動、對帳', render: renderCashWallet, accent: 'account', icon: 'bankAccounts' };

let moreView = null;

function moreMenuItem(key) {
  return key === CASH_MENU_ITEM.key ? CASH_MENU_ITEM : (MORE_MENU_ITEMS.find(item => item.key === key) || null);
}

function renderMoreMenu() {
  return (
    '<h2>更多</h2>' +
    '<div class="card more-menu">' +
    [CASH_MENU_ITEM].concat(MORE_MENU_ITEMS).map(item =>
      '<button class="more-menu-item tab-' + item.accent + '" onclick="setMoreView(\'' + item.key + '\')">' +
      '<span class="more-menu-icon">' + iconHtml(item.icon) + '</span>' +
      '<span><span class="more-menu-title">' + escapeHtml(item.label) + '</span>' +
      '<span class="more-menu-desc">' + escapeHtml(item.desc) + '</span></span>' +
      '<span class="more-menu-arrow">›</span>' +
      '</button>'
    ).join('') +
    '</div>'
  );
}

function renderMore() {
  if (!moreView) return renderMoreMenu();
  const item = moreMenuItem(moreView);
  if (!item) return renderMoreMenu();
  return '<button class="btn-ghost more-back" onclick="setMoreView(null)">‹ 更多</button>' + item.render();
}

function setMoreView(view) {
  moreView = view;
  render();
}

// ===================== 10. 導覽與初始化 =====================
const TABS = [
  { key: 'overview', label: '總覽', render: renderOverview, accent: 'neutral', icon: 'overview' },
  { key: 'personal', label: '個人', render: renderPersonal, accent: 'personal', icon: 'personal' },
  { key: 'family', label: '家庭', render: renderFamilyFund, accent: 'family', icon: 'family' },
  { key: 'more', label: '更多', render: renderMore, accent: 'neutral', icon: 'more' }
];

let currentView = 'overview';

function renderTabbar(tab) {
  document.getElementById('tabbar').innerHTML = TABS.map(t =>
    '<button class="tab-' + t.accent + (t.key === currentView ? ' active' : '') + '"' + (t.key === currentView ? ' aria-current="page"' : '') + ' onclick="switchView(\'' + t.key + '\')">' + iconHtml(t.icon) + '<span>' + t.label + '</span></button>'
  ).join('');
}

function activeTab() {
  return TABS.find(t => t.key === currentView) || TABS[0];
}

function activeAccent(tab) {
  const item = currentView === 'more' && moreView ? moreMenuItem(moreView) : null;
  return item ? item.accent : tab.accent;
}

function routeToView(key) {
  if (key === 'creditCards' || key === 'bankAccounts' || key === 'cashWallet' || key === 'dataCheck' || key === 'backup' || key === 'settings') {
    currentView = 'more';
    moreView = key;
    return;
  }
  currentView = TABS.some(t => t.key === key) ? key : 'overview';
  if (currentView !== 'more') moreView = null;
}

function render() {
  let tab = activeTab();
  if (tab.key !== currentView) {
    currentView = tab.key;
    if (currentView !== 'more') moreView = null;
  }
  try {
    const reminderHtml = currentView === 'overview' ? '' : backupReminderBannerHtml();
    document.getElementById('app').className = 'ctx-' + activeAccent(tab);
    document.getElementById('app').innerHTML = privacyToggleHtml() + testModeBannerHtml() + reminderHtml + tab.render();
    renderTabbar(tab);
    enhanceFormAccessibility(document);
  } catch (e) {
    // 任何一頁畫面渲染失敗都不該讓整頁變空白，至少要留一個看得懂的訊息
    document.getElementById('app').innerHTML =
      privacyToggleHtml() +
      testModeBannerHtml() +
      backupReminderBannerHtml() +
      '<div class="card"><h2>畫面發生錯誤</h2>' +
      '<p>' + escapeHtml(e.message) + '</p>' +
      '<p class="muted">可能是資料格式有問題。請到「備份」頁嘗試匯入一份正確的備份檔，或聯絡開發者協助排查。</p></div>';
    renderTabbar(tab);
    enhanceFormAccessibility(document);
  }
}

function switchView(key) {
  currentView = TABS.some(t => t.key === key) ? key : 'overview';
  if (currentView === 'more') {
    moreView = stateBlocked ? 'backup' : null;
  } else {
    moreView = null;
  }
  render();
}

render();
</script>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>家庭與個人記帳工具</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="icon" href="./assets/icons/app-icon-32.png" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="./assets/icons/app-icon-180.png">
<meta name="theme-color" content="#28384A">
<meta name="application-name" content="家庭資金">
<meta name="apple-mobile-web-app-title" content="家庭資金">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<style>
  /* 「帳本」主題：暖灰紙色底 + 每個資金分類各自的色標，仿實體帳本的彩色分隔頁籤 */
  :root {
    --bg: #EDEFE7; --surface: #FFFFFF; --ink: #23261F; --ink-muted: #5E6258;
    --border: #DEE0D3; --field: #FBFBF8;
    --personal: #2F6F62;  /* 個人：深青綠 */
    --family: #C77B2C;    /* 家庭：暖琥珀 */
    --credit: #A63D2F;    /* 信用卡：磚紅 */
    --account: #33507A;   /* 銀行帳戶：靛藍 */
    --neutral: #55584C;   /* 設定／備份：中性墨綠灰 */
    --danger: #C23B2E;
    color-scheme: light dark;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1C1E18; --surface: #262922; --ink: #ECEEE4; --ink-muted: #A3A69A;
      --border: #3A3D33; --field: #20221C;
      --personal: #4FA08D;
      --family: #E0983F;
      --credit: #D2695A;
      --account: #5D80B0;
      --neutral: #9A9D8E;
      --danger: #E2574A;
    }
    .alert-due { background: #4A3B16; color: #F3D77A; }
    .alert-overdue { background: #4A211D; color: #FFB2A8; }
    #toast .toast-msg { background: #ECEEE4; color: #1C1E18; }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg); color: var(--ink); padding-bottom: 86px; -webkit-font-smoothing: antialiased; overflow-x: hidden;
  }
  #app { padding: 14px; max-width: 480px; width: 100%; margin: 0 auto; overflow-x: hidden; }
  .card {
    background: var(--surface); border-radius: 14px; padding: 16px; margin-bottom: 12px;
    box-shadow: 0 1px 3px rgba(35,38,31,.07); border-left: 4px solid var(--border);
    max-width: 100%; overflow-x: hidden;
  }
  .section-title { margin: 18px 0 10px; }
  .section-title:first-child { margin-top: 0; }
  /* 頁面情境色：依目前分頁自動幫卡片、按鈕、輸入框焦點上色 */
  .ctx-personal .card { border-left-color: var(--personal); }
  .ctx-family .card { border-left-color: var(--family); }
  .ctx-credit .card { border-left-color: var(--credit); }
  .ctx-account .card { border-left-color: var(--account); }
  .ctx-neutral .card { border-left-color: var(--neutral); }
  .ctx-personal .btn-primary, .ctx-personal input:focus, .ctx-personal select:focus { border-color: var(--personal); }
  .ctx-family .btn-primary, .ctx-family input:focus, .ctx-family select:focus { border-color: var(--family); }
  .ctx-credit .btn-primary, .ctx-credit input:focus, .ctx-credit select:focus { border-color: var(--credit); }
  .ctx-account .btn-primary, .ctx-account input:focus, .ctx-account select:focus { border-color: var(--account); }
  .ctx-neutral .btn-primary, .ctx-neutral input:focus, .ctx-neutral select:focus { border-color: var(--neutral); }
  .ctx-personal .btn-primary { background: var(--personal); }
  .ctx-family .btn-primary { background: var(--family); }
  .ctx-credit .btn-primary { background: var(--credit); }
  .ctx-account .btn-primary { background: var(--account); }
  .ctx-neutral .btn-primary { background: var(--neutral); }
  /* 總覽頁混合多種分類，個別卡片手動指定色標，優先於頁面情境色 */
  .card.tab-personal { border-left-color: var(--personal); }
  .card.tab-family { border-left-color: var(--family); }
  .card.tab-credit { border-left-color: var(--credit); }
  .card.tab-account { border-left-color: var(--account); }

  .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 7px 0; min-width: 0; }
  .row > * { min-width: 0; }
  .row > *:last-child { text-align: right; overflow-wrap: anywhere; }
  .page-summary-row, .account-balance-row {
    display: grid; grid-template-columns: minmax(0, 1fr); gap: 4px;
    align-items: start; padding: 7px 0;
  }
  .page-summary-row .big, .account-balance-row .big {
    text-align: left; overflow-wrap: anywhere; line-height: 1.15;
  }
  .muted { color: var(--ink-muted); font-size: 12.5px; }
  p { line-height: 1.5; overflow-wrap: anywhere; word-break: break-word; }
  .label { color: var(--ink-muted); font-size: 11px; text-transform: uppercase; letter-spacing: .07em; font-weight: 700; }
  .big { font-size: clamp(22px, 7vw, 28px); font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: 0; }
  .neg { color: var(--danger); }
  h2 { font-size: 15px; margin: 2px 0 12px; font-weight: 700; color: var(--ink); }
  label { display: block; font-size: 12.5px; color: var(--ink-muted); font-weight: 600; margin-top: 10px; }
  input, select, textarea {
    width: 100%; padding: 10px; border: 1.5px solid var(--border); border-radius: 10px;
    font-size: 16px; margin-top: 4px; background: var(--field); color: var(--ink);
  }
  input:focus, select:focus, textarea:focus { outline: none; }
  button:focus-visible, input:focus-visible, select:focus-visible, textarea:focus-visible, summary:focus-visible {
    outline: 3px solid color-mix(in srgb, currentColor 55%, transparent);
    outline-offset: 2px;
  }
  input[type="checkbox"] { width: auto; margin: 0 6px 0 0; vertical-align: middle; }
  .list-filter { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .list-filter input[type="month"] { width: auto; margin-top: 0; }
  .list-filter label { display: inline-flex; align-items: center; font-size: 13px; margin-top: 0; font-weight: 500; }
  button { border: none; border-radius: 10px; padding: 11px 16px; font-size: 14.5px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: var(--ink); color: #fff; width: 100%; margin-top: 14px; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-ghost { background: transparent; color: var(--ink-muted); padding: 4px 8px; text-decoration: underline; }
  .btn-secondary {
    background: var(--field); color: var(--ink); border: 1.5px solid var(--border);
    padding: 9px 12px; margin-top: 10px;
  }
  .field-error { color: var(--danger); font-size: 12.5px; margin-top: 4px; font-weight: 700; }
  .action-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
  .action-row .btn-danger { margin-left: auto; }
  .just-saved { box-shadow: 0 0 0 3px color-mix(in srgb, var(--family) 30%, transparent); }
  .compact-summary .row { margin: 6px 0; }
  .status-note { border-left: 3px solid var(--family); padding-left: 10px; margin-top: 8px; }
  .reimb-impact {
    margin-top: 12px; padding: 12px; border: 1px solid var(--border); border-left: 4px solid var(--family);
    border-radius: 10px; background: var(--field);
  }
  .reimb-impact .row { align-items: flex-start; border-bottom: 1px solid var(--border); }
  .reimb-impact .row:last-child { border-bottom: none; }
  .reimb-quick-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .reimb-quick-row .btn-ghost { flex: 0 0 auto; min-height: 44px; }
  .problem-item { display: flex; flex-direction: column; gap: 8px; min-width: 0; }
  .problem-type { font-weight: 700; }
  .problem-desc {
    line-height: 1.45; max-width: calc(100vw - 76px);
    white-space: normal; overflow-wrap: anywhere; word-break: break-word;
  }
  .problem-action { align-self: flex-start; }
  .more-menu {
    padding: 6px 12px;
  }
  .more-menu-item {
    display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 8px; align-items: center;
    width: 100%; padding: 14px 2px; border-radius: 0; border-bottom: 1px solid var(--border);
    background: transparent; color: var(--ink); text-align: left; text-decoration: none;
  }
  .more-menu-item:last-child { border-bottom: none; }
  .more-menu-title { display: block; font-size: 15px; font-weight: 700; }
  .more-menu-desc { display: block; margin-top: 3px; color: var(--ink-muted); font-size: 12.5px; line-height: 1.35; }
  .more-menu-arrow { color: var(--ink-muted); font-size: 18px; }
  .more-back { margin: 0 0 12px; text-decoration: none; }
  .metric-row {
    display: grid; grid-template-columns: minmax(0, 1fr); gap: 2px;
    padding: 7px 0; overflow-wrap: anywhere;
  }
  .metric-row .metric-value { font-variant-numeric: tabular-nums; font-weight: 700; }
  .metric-row .big { display: block; max-width: 100%; }
  .report-filter { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: end; }
  .report-filter label { margin-top: 0; }
  .report-filter .btn-ghost { min-height: 44px; white-space: nowrap; }
  .report-section + .report-section { margin-top: 18px; }
  .report-section-title { margin: 0 0 8px; font-size: 14px; }
  .report-list { display: grid; gap: 10px; }
  .report-item { min-width: 0; }
  .report-item-head { display: flex; justify-content: space-between; gap: 10px; margin-bottom: 4px; }
  .report-item-head > * { min-width: 0; overflow-wrap: anywhere; }
  .report-item-head > *:last-child { flex: 0 0 auto; text-align: right; font-variant-numeric: tabular-nums; }
  .report-bar-track { width: 100%; min-width: 0; height: 10px; display: flex; overflow: hidden; border-radius: 999px; background: var(--border); }
  .report-bar { height: 100%; min-width: 0; }
  .report-bar-personal { background: var(--personal); }
  .report-bar-family { background: var(--family); }
  .report-legend { display: flex; flex-wrap: wrap; gap: 12px; margin: 2px 0 12px; color: var(--ink-muted); font-size: 12.5px; }
  .report-legend-item { display: inline-flex; align-items: center; gap: 5px; }
  .report-legend-swatch { width: 11px; height: 11px; border-radius: 3px; }
  .report-trend-list { display: grid; gap: 10px; }
  .report-trend-row { display: grid; grid-template-columns: 58px minmax(48px, 1fr) auto; gap: 8px; align-items: center; min-width: 0; }
  .report-trend-label { color: var(--ink-muted); font-size: 12.5px; white-space: nowrap; }
  .report-trend-value { font-size: 12.5px; font-weight: 700; font-variant-numeric: tabular-nums; text-align: right; }
  .test-mode-banner {
    display: flex; flex-direction: column; align-items: flex-start; gap: 8px;
    line-height: 1.45; overflow-wrap: anywhere;
  }
  .test-mode-banner .btn-ghost { margin: 0; color: inherit; background: rgba(255,255,255,.45); text-decoration: none; }
  ul.list { list-style: none; margin: 0; padding: 0; }
  ul.list li { border-bottom: 1px solid var(--border); padding: 9px 0; }
  ul.list li:last-child { border-bottom: none; }
  .ledger-list { display: grid; gap: 8px; margin-top: 8px; }
  .ledger-item { border: 1px solid var(--border); border-radius: 12px; padding: 10px; background: var(--field); min-width: 0; }
  .ledger-head { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items: start; }
  .ledger-title { font-weight: 700; overflow-wrap: anywhere; }
  .ledger-badge { display: inline-block; padding: 2px 7px; border: 1px solid var(--border); border-radius: 999px; font-size: 11px; color: var(--ink-muted); margin-bottom: 4px; }
  .ledger-delta { font-weight: 800; font-variant-numeric: tabular-nums; white-space: nowrap; }
  .ledger-delta.income { color: var(--personal); }
  .ledger-delta.expense { color: var(--danger); }
  .ledger-after { display: flex; flex-wrap: wrap; gap: 4px 12px; margin-top: 7px; color: var(--ink-muted); font-size: 12px; }
  .ledger-after b { color: var(--ink); font-variant-numeric: tabular-nums; }
  .ledger-filter { display: grid; grid-template-columns: minmax(0, 1fr); gap: 8px; margin: 8px 0 12px; }
  .ledger-filter label { margin-top: 0; }
  .detail-tools { display: grid; gap: 10px; margin: 10px 0 12px; }
  .detail-search-row { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 8px; align-items: end; }
  .detail-search-row label { min-width: 0; margin: 0; }
  .detail-search-row input { margin-top: 5px; }
  .detail-search-row button { width: auto; min-width: 64px; margin: 0; }
  .detail-filter-label { margin: 0 0 5px; color: var(--ink-muted); font-size: 12px; font-weight: 750; }
  .detail-filter-chips, .detail-group-actions { display: flex; flex-wrap: wrap; gap: 7px; }
  .detail-filter-chips button, .detail-group-actions button {
    width: auto; min-height: 44px; margin: 0; padding: 7px 12px;
    border: 1px solid var(--border); border-radius: 999px; box-shadow: none;
    background: var(--field); color: var(--ink); font-size: 13px; font-weight: 700;
  }
  .detail-filter-chips button[aria-pressed="true"] {
    border-color: var(--metro-line); background: #E3ECE5; color: var(--metro-ink);
    box-shadow: inset 0 0 0 1px var(--metro-mint);
  }
  .quick-add-scope-toggle {
    display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px;
  }
  .quick-add-scope-toggle button {
    width: 100%; min-height: 56px; padding: 12px 16px; font-size: 16px;
  }
  .detail-match-count { margin: -2px 0 0; color: var(--ink-muted); font-size: 12.5px; font-weight: 700; }
  .detail-date-groups { position: relative; display: grid; gap: 0; margin-top: 8px; padding-left: 18px; }
  .detail-date-groups::before {
    content: ""; position: absolute; left: 6px; top: 22px; bottom: 22px;
    border-left: 2px solid var(--detail-route, var(--metro-sky)); opacity: .55;
  }
  .detail-date-group { position: relative; min-width: 0; border-bottom: 1px dashed var(--border); }
  .detail-date-group:last-child { border-bottom: 0; }
  .detail-date-group::before {
    content: ""; position: absolute; z-index: 1; left: -17px; top: 17px; width: 10px; height: 10px;
    border-radius: 50%; background: var(--detail-route, var(--metro-sky));
    border: 2px solid var(--surface); box-shadow: 0 0 0 1px var(--metro-line);
  }
  .detail-date-group > summary {
    min-height: 44px; display: grid; grid-template-columns: minmax(0,1fr) auto;
    gap: 10px; align-items: center; padding: 8px 2px 8px 5px; cursor: pointer;
  }
  .detail-date-group > summary::marker { color: var(--detail-route, var(--metro-sky)); }
  .detail-date-main { min-width: 0; }
  .detail-date-main time { display: block; color: var(--ink); font-weight: 850; font-variant-numeric: tabular-nums; }
  .detail-date-count { display: block; margin-top: 1px; color: var(--ink-muted); font-size: 11.5px; }
  .detail-date-total { text-align: right; font: 800 14px/1.2 Bahnschrift,"PingFang TC",sans-serif; font-variant-numeric: tabular-nums; }
  .detail-date-body { padding: 0 0 10px 5px; }
  .detail-date-body.list { margin: 0; }
  .detail-date-body.list > li { list-style: none; }
  .detail-date-body.list > li:first-child, .detail-date-body.ledger-list > .ledger-item:first-child { border-top: 0; }
  .detail-date-body.ledger-list { margin-top: 0; }
  .detail-empty { padding: 14px 4px; color: var(--ink-muted); }
  .detail-empty button { width: auto; margin: 9px 0 0; }
  .detail-personal { --detail-route: var(--metro-sand); }
  .detail-family, .detail-envelope { --detail-route: var(--metro-mint); }
  .detail-account { --detail-route: var(--metro-sky); }
  .deposit-impact { margin-top: 10px; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--field); }
  .reconcile-summary { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 6px; margin-top: 10px; }
  .reconcile-metric { border: 1px solid var(--border); border-radius: 10px; padding: 8px; min-width: 0; }
  .reconcile-metric b { display: block; margin-top: 3px; overflow-wrap: anywhere; font-variant-numeric: tabular-nums; }
  @media (max-width: 390px) { .reconcile-summary { grid-template-columns: minmax(0, 1fr); } }
  details.tucked { margin-top: 4px; }
  details.tucked summary {
    cursor: pointer; font-size: 14px; font-weight: 700; color: var(--ink-muted);
    padding: 6px 0; list-style: none;
  }
  details.tucked summary::-webkit-details-marker { display: none; }
  details.tucked summary::before { content: '▸ '; }
  details.tucked[open] summary::before { content: '▾ '; }
  details.tucked .card { margin-top: 8px; }
  #modal {
    position: fixed; inset: 0; background: rgba(35,38,31,.45);
    display: none; align-items: flex-end; justify-content: center; z-index: 50;
  }
  #modal .sheet {
    background: var(--surface); width: 100%; max-width: 480px;
    border-radius: 16px 16px 0 0; padding: 18px 16px 24px;
    max-height: 88vh; overflow-y: auto;
  }
  #modal .sheet h2 { margin-top: 0; }
  #modal .modal-close {
    background: transparent; color: var(--ink-muted); float: right;
    width: 44px; height: 44px; padding: 0; font-size: 20px;
  }
  #toast {
    position: fixed; bottom: 84px; left: 0; right: 0;
    display: flex; justify-content: center; z-index: 60; pointer-events: none;
  }
  #toast .toast-msg {
    background: var(--ink); color: #fff; padding: 10px 18px;
    border-radius: 999px; font-size: 14px; opacity: 0;
    transition: opacity .25s; box-shadow: 0 2px 8px rgba(0,0,0,.2);
  }
  #toast .toast-msg.show { opacity: .95; }
  @media (prefers-color-scheme: dark) {
    #toast .toast-msg { background: #ECEEE4; color: #1C1E18; }
  }
  .alert-due {
    background: #FFF4D6; color: #8A6D00; border-radius: 8px;
    padding: 8px 10px; font-size: 13px; margin: 6px 0;
  }
  .alert-overdue {
    background: #FBE0DC; color: #A6231A; border-radius: 8px;
    padding: 8px 10px; font-size: 13px; font-weight: 700; margin: 6px 0;
  }
  @media (prefers-color-scheme: dark) {
    .alert-due { background: #4A3B16; color: #F3D77A; }
    .alert-overdue { background: #4A211D; color: #FFB2A8; }
  }
  #tabbar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px; display: flex;
    background: var(--surface); border-top: 1px solid var(--border);
  }
  #tabbar button {
    flex: 1 1 0; min-width: 0; background: none; border-radius: 0; padding: 12px 1px;
    min-height: 44px; font-size: 12px; color: var(--ink-muted); font-weight: 600; white-space: nowrap;
  }
  #tabbar button.active.tab-personal { color: var(--personal); }
  #tabbar button.active.tab-family { color: var(--family); }
  #tabbar button.active.tab-credit { color: var(--credit); }
  #tabbar button.active.tab-account { color: var(--account); }
  #tabbar button.active.tab-neutral { color: var(--neutral); }

  /* 批次 P1：家庭資金捷運圖。保留既有語意色，新增 App 級視覺角色。 */
  :root {
    --metro-bg: #F1F4EF;
    --metro-ink: #28384A;
    --metro-sky: #83A7C5;
    --metro-mint: #7BA68F;
    --metro-sand: #D8BD78;
    --metro-clay: #D58679;
    --metro-paper: #FBFCF8;
    --metro-line: #314354;
    --metro-soft-line: #C9D1C9;
    --metro-shadow: 4px 5px 0 rgba(40, 56, 74, .14);
    --metro-nav-height: 72px;
    --account: #668EAE;
    --family: #668F78;
    --credit: #B7665C;
    --personal: #7B7561;
    --neutral: #526376;
  }
  body {
    background-color: var(--metro-bg);
    background-image:
      linear-gradient(rgba(40,56,74,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(40,56,74,.025) 1px, transparent 1px);
    background-size: 24px 24px;
    padding-bottom: calc(var(--metro-nav-height) + env(safe-area-inset-bottom, 0px) + 22px);
  }
  #app { padding: 12px 14px 20px; }
  .icon {
    width: 22px; height: 22px; display: inline-block; flex: 0 0 auto;
    fill: none; stroke: currentColor; stroke-width: 1.9;
    stroke-linecap: round; stroke-linejoin: round; vertical-align: middle;
  }
  .app-topbar {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    margin-bottom: 12px; min-height: 48px;
  }
  @media (display-mode: standalone) {
    .app-topbar { padding-top: env(safe-area-inset-top, 0px); }
  }
  .app-identity { display: flex; align-items: center; gap: 9px; min-width: 0; }
  .app-mark {
    width: 36px; height: 36px; display: grid; place-items: center; flex: 0 0 auto;
    border: 2px solid var(--metro-line); border-radius: 11px 11px 11px 4px;
    background: var(--metro-sand); color: var(--metro-ink); box-shadow: 2px 2px 0 var(--metro-line);
  }
  .app-mark .icon { width: 20px; height: 20px; }
  .app-name { font: 800 15px/1.1 Bahnschrift, "PingFang TC", "Microsoft JhengHei", sans-serif; letter-spacing: .03em; }
  .app-kicker { color: var(--ink-muted); font-size: 11px; margin-top: 3px; }

<body>
  <main id="app"></main>
  <nav id="tabbar"></nav>
  <div id="modal" style="display:none"></div>
  <div id="toast"></div>
<script>
// ===================== 1. 資料層 =====================
const STORAGE_KEY = 'familyBudgetTracker';
const SCHEMA_VERSION = 1;
const BACKUP_REMINDER_DAYS = 14;
const BACKUP_REMINDER_SNOOZE_DAYS = 3;
let stateBlocked = false; // 偵測到不相容/損毀資料時鎖定寫入，避免覆蓋原始資料

function defaultState() {
  return {
    schemaVersion: SCHEMA_VERSION,
    updatedAt: null,
    lastBackupAt: null,
    backupReminderSnoozedUntil: null,
    data: {
      transactions: [],
      familyFundDeposits: [],
      familyFundReimbursements: [],
      creditCards: [],
      creditCardPayments: [],
      bankAccounts: [],
      accountManualMovements: [],
      cashWallet: null,
      cashManualMovements: [],
      banks: [],
      categoryKeywords: [
        { category: '餐飲', keywords: ['早餐','午餐','晚餐','麥當勞','超商','7-11','全家','咖啡','餐廳'] },
        { category: '交通', keywords: ['加油','悠遊卡','捷運','公車','計程車','uber','停車'] },
        { category: '購物', keywords: ['蝦皮','momo','pchome','網購','買'] },
        { category: '娛樂', keywords: ['電影','遊戲','訂閱','netflix'] },
        { category: '醫療', keywords: ['藥局','診所','醫院','看醫生'] }
      ].map(c => Object.assign({}, c, { id: genId(), createdAt: nowIso(), updatedAt: nowIso() })),
      templates: { personal: [], family: [] },
      monthlyReconciliation: [],
      settings: { privacyModeAutoHide: false }
    }
  };
}

let storageAvailable = true; // localStorage 本身是否可用；部分手機瀏覽器用 file:// 協定打開本機檔案時會封鎖 localStorage
let storageWarningShown = false; // 避免每次存檔失敗都彈一次 alert

// 合法的信用卡帳務狀態（統一常數，程式各處與驗證都以此為準）
const CARD_STATUSES = ['未結帳', '已出帳', '不列入計算'];
const FAMILY_CATEGORIES = ['房租', '水電網路瓦斯', '家用', '旅遊基金', '急用'];
const DATE_RE = /^\d{4}-\d{2}-\d{2}$/;
const YM_RE = /^\d{4}-\d{2}$/;

// 把舊版本用過的 cardStatus 值遷移成現行值。
function migrateCardStatus(status) {
  if (status === '不計入本期') return '不列入計算';
  if (status === '已繳款') return '已出帳';
  return status;
}

// 嚴格檢查日期字串：不只格式，還要是真的存在的日期。
function isValidDateString(s) {
  if (typeof s !== 'string' || !DATE_RE.test(s)) return false;
  const [y, m, d] = s.split('-').map(Number);
  if (m < 1 || m > 12 || d < 1 || d > 31) return false;
  const dt = new Date(y, m - 1, d);
  return dt.getFullYear() === y && dt.getMonth() === m - 1 && dt.getDate() === d;
}

// 嚴格檢查帳單月份字串（YYYY-MM），月份要 1-12。
function isValidYearMonth(s) {
  if (typeof s !== 'string' || !YM_RE.test(s)) return false;
  const mm = Number(s.slice(5, 7));
  return mm >= 1 && mm <= 12;
}

// 深度驗證＋遷移。loadState 與 handleImport 共用（A3/A4 接上）。
// 注意：本函式先深拷貝傳入資料，只改動並回傳拷貝，不動呼叫端原物件。
function deepValidateAndMigrate(parsed) {
  const fail = (msg) => ({ error: msg, state: null });
  if (!parsed || typeof parsed !== 'object') return fail('不是有效的資料物件。');

  let work;
  try {
    work = JSON.parse(JSON.stringify(parsed));
  } catch (e) {
    return fail('資料無法解析（可能含有無法序列化的內容）。');
  }

  if (work.schemaVersion !== SCHEMA_VERSION) {
    return fail('資料版本（' + work.schemaVersion + '）跟目前程式版本（' + SCHEMA_VERSION + '）不相容。');
  }
  const normalizeReminderDate = value => (
    typeof value === 'string' && Number.isFinite(Date.parse(value)) ? value : null
  );
  work.lastBackupAt = normalizeReminderDate(work.lastBackupAt);
  work.backupReminderSnoozedUntil = normalizeReminderDate(work.backupReminderSnoozedUntil);
  const data = work.data;
  if (!data || typeof data !== 'object') return fail('缺少 data 區塊。');
  if (!Object.prototype.hasOwnProperty.call(data, 'cashWallet')) data.cashWallet = null;
  if (!Object.prototype.hasOwnProperty.call(data, 'cashManualMovements')) data.cashManualMovements = [];

  const arrayKeys = [
    'transactions', 'familyFundDeposits', 'familyFundReimbursements',
    'creditCards', 'creditCardPayments', 'bankAccounts', 'accountManualMovements', 'cashManualMovements',
    'banks', 'categoryKeywords', 'monthlyReconciliation'
  ];
  for (const k of arrayKeys) {
    if (!Array.isArray(data[k])) return fail('欄位 data.' + k + ' 應該是陣列。');
  }
  if (!data.templates || !Array.isArray(data.templates.personal) || !Array.isArray(data.templates.family)) {
    return fail('欄位 data.templates 格式錯誤。');
  }
  if (!data.settings || typeof data.settings !== 'object') {
    return fail('欄位 data.settings 格式錯誤。');
  }
  data.settings.privacyModeAutoHide = data.settings.privacyModeAutoHide === true;

  const idCollections = arrayKeys.map(k => data[k]).concat([data.templates.personal, data.templates.family]);
  for (const coll of idCollections) {
    for (const rec of coll) {
      if (!rec || typeof rec !== 'object') return fail('有一筆不是有效物件的記錄。');
      if (rec.id === undefined || rec.id === null) {
        rec.id = genId();
      } else if (!isValidId(rec.id)) {
        return fail('有一筆記錄的 id 格式不正確，資料可能已損毀或被竄改。');
      }
    }
  }

  const accountIds = new Set(data.bankAccounts.map(a => a.id));
  const cardIds = new Set(data.creditCards.map(c => c.id));
  const badAmount = (rec) => !(Number.isInteger(rec.amount) && rec.amount > 0);
  const badDate = (rec) => !isValidDateString(rec.date);

  for (const t of data.transactions) {
    if (badAmount(t)) return fail('有一筆交易的金額不是正整數。');
    if (badDate(t)) return fail('有一筆交易的日期格式不正確（應為 YYYY-MM-DD）。');
    if (t.scope !== 'personal' && t.scope !== 'family') return fail('有一筆交易的類型（scope）不正確。');
    if (t.scope === 'family') {
      if (!t.category || t.category === '對帳調整') t.category = '家用';
      if (FAMILY_CATEGORIES.indexOf(t.category) === -1) return fail('有一筆家庭交易的類別不正確。');
    }
    if (t.paymentMethod !== 'cash' && t.paymentMethod !== 'bankAccount' && t.paymentMethod !== 'creditCard') {
      return fail('有一筆交易的支付方式不正確。');
    }
    if (t.paymentMethod === 'bankAccount' && !accountIds.has(t.accountId)) {
      return fail('有一筆交易指向不存在的銀行帳戶。');
    }
    if (t.paymentMethod === 'creditCard') {
      if (!cardIds.has(t.cardId)) return fail('有一筆交易指向不存在的信用卡。');
      t.cardStatus = migrateCardStatus(t.cardStatus);
      if (CARD_STATUSES.indexOf(t.cardStatus) === -1) return fail('有一筆信用卡交易的帳務狀態不正確。');
      if (!isValidYearMonth(t.billingMonth)) return fail('有一筆信用卡交易的帳單月份格式不正確。');
    }
  }

  for (const d of data.familyFundDeposits) {
    if (badAmount(d)) return fail('有一筆家庭基金存入的金額不是正整數。');
    if (badDate(d)) return fail('有一筆家庭基金存入的日期格式不正確。');
    if (!d.depositedBy) return fail('有一筆家庭基金存入缺少存入人。');
    if (!d.category) d.category = '家用';
    if (FAMILY_CATEGORIES.indexOf(d.category) === -1) return fail('有一筆家庭基金存入的類別不正確。');
    if (d.fromAccountId != null && !accountIds.has(d.fromAccountId)) return fail('有一筆家庭基金存入指向不存在的帳戶。');
  }

  for (const r of data.familyFundReimbursements) {
    if (badAmount(r)) return fail('有一筆補款的金額不是正整數。');
    if (badDate(r)) return fail('有一筆補款的日期格式不正確。');
    if (!r.category) r.category = '家用';
    if (FAMILY_CATEGORIES.indexOf(r.category) === -1) return fail('有一筆補款的類別不正確。');
    if (r.method == null) r.method = 'bankAccount';
    if (r.method !== 'cash' && r.method !== 'bankAccount') return fail('有一筆補款的方式不正確。');
    if (r.cardId === undefined) r.cardId = null;
    if (r.method === 'cash') r.toAccountId = null;
    if (r.method === 'bankAccount' && !accountIds.has(r.toAccountId)) return fail('有一筆補款指向不存在的帳戶。');
    if (r.cardId != null && (!isValidId(r.cardId) || !cardIds.has(r.cardId))) return fail('有一筆補款關聯到不存在的信用卡。');
  }

  for (const p of data.creditCardPayments) {
    if (badAmount(p)) return fail('有一筆信用卡還款的金額不是正整數。');
    if (badDate(p)) return fail('有一筆信用卡還款的日期格式不正確。');
    if (!cardIds.has(p.cardId)) return fail('有一筆信用卡還款指向不存在的信用卡。');
    if (p.fromAccountId != null && !accountIds.has(p.fromAccountId)) return fail('有一筆信用卡還款指向不存在的帳戶。');
  }

  for (const m of data.accountManualMovements) {
    if (badAmount(m)) return fail('有一筆帳戶異動的金額不是正整數。');
    if (badDate(m)) return fail('有一筆帳戶異動的日期格式不正確。');
    if (!accountIds.has(m.accountId)) return fail('有一筆帳戶異動指向不存在的帳戶。');
    if (m.direction !== '存入' && m.direction !== '提出') return fail('有一筆帳戶異動的方向不正確。');
  }

  if (data.cashWallet !== null) {
    if (!data.cashWallet || typeof data.cashWallet !== 'object' || !Number.isInteger(data.cashWallet.openingBalance) || !isValidDateString(data.cashWallet.startDate)) {
      return fail('欄位 data.cashWallet 格式不正確。');
    }
  }
  for (const m of data.cashManualMovements) {
    if (badAmount(m)) return fail('有一筆現金異動的金額不是正整數。');
    if (badDate(m)) return fail('有一筆現金異動的日期格式不正確。');
    if (m.direction !== '存入' && m.direction !== '提出') return fail('有一筆現金異動的方向不正確。');
  }

  for (const c of data.creditCards) {
    if (!Number.isInteger(c.creditLimit) || c.creditLimit <= 0) return fail('有一張信用卡的額度不正確。');
    if (!Number.isInteger(c.statementDay) || c.statementDay < 1 || c.statementDay > 31) return fail('有一張信用卡的結帳日不正確。');
    if (!Number.isInteger(c.dueDay) || c.dueDay < 1 || c.dueDay > 31) return fail('有一張信用卡的繳款日不正確。');
    if (!Array.isArray(c.installments)) c.installments = [];
    for (const inst of c.installments) {
      if (!inst || typeof inst !== 'object') return fail('有一筆分期資料不是有效物件。');
      if (inst.id === undefined || inst.id === null) {
        inst.id = genId();
      } else if (!isValidId(inst.id)) {
        return fail('有一筆分期的 id 格式不正確，資料可能已損毀或被竄改。');
      }
      if (!Number.isInteger(inst.totalAmount) || inst.totalAmount <= 0) return fail('有一筆分期的總額不是正整數。');
      if (!Number.isInteger(inst.perInstallment) || inst.perInstallment <= 0) return fail('有一筆分期的每期金額不是正整數。');
      if (!Number.isInteger(inst.totalPeriods) || inst.totalPeriods <= 0) return fail('有一筆分期的總期數不是正整數。');
      if (!Number.isInteger(inst.paidPeriods) || inst.paidPeriods < 0 || inst.paidPeriods > inst.totalPeriods) {
        return fail('有一筆分期的已還期數不正確。');
      }
      if (!Object.prototype.hasOwnProperty.call(inst, 'paidDates')) inst.paidDates = [];
      if (!Array.isArray(inst.paidDates) || !inst.paidDates.every(isValidDateString) || inst.paidDates.length > inst.paidPeriods) {
        return fail('有一筆分期的繳款日期不正確。');
      }
    }
  }

  for (const a of data.bankAccounts) {
    if (!Number.isInteger(a.openingBalance)) return fail('有一個帳戶的期初餘額不是整數。');
    if (!a.name) return fail('有一個帳戶缺少名稱。');
  }

  const validReconciliationModules = ['creditCard', 'familyFund', 'bankAccount', 'cashWallet'];
  for (const r of data.monthlyReconciliation) {
    if (badDate(r)) return fail('有一筆對帳紀錄的日期格式不正確。');
    if (validReconciliationModules.indexOf(r.module) === -1) return fail('有一筆對帳紀錄的 module 不正確。');
    if (r.module === 'bankAccount' && !accountIds.has(r.refId)) return fail('有一筆對帳紀錄指向不存在的銀行帳戶。');
    if (r.module === 'creditCard' && !cardIds.has(r.refId)) return fail('有一筆對帳紀錄指向不存在的信用卡。');
    if (r.module === 'cashWallet' && r.refId !== 'cash') return fail('現金對帳紀錄的 refId 必須是 cash。');
    if (r.module === 'familyFund') {
      if (r.refId == null) r.refId = '家用';
      if (FAMILY_CATEGORIES.indexOf(r.refId) === -1) return fail('家庭基金對帳紀錄的 refId 必須是有效類別。');
    }
    if (!Number.isInteger(r.recordedBalance) || !Number.isInteger(r.actualBalance) || !Number.isInteger(r.diff)) {
      return fail('有一筆對帳紀錄的金額不是整數。');
    }
    if (r.diff !== r.actualBalance - r.recordedBalance) return fail('有一筆對帳紀錄的差額計算不一致。');
    if (r.adjustmentRecordId != null && !isValidId(r.adjustmentRecordId)) return fail('有一筆對帳紀錄的調整記錄 id 格式不正確。');
  }

  // categoryKeywords 的內容驗證（Phase 1 就會被 suggestCategory 用到，keywords 一定要是字串陣列，否則之後會炸）
  for (const c of data.categoryKeywords) {
    if (typeof c.category !== 'string' || !c.category) return fail('有一個分類缺少名稱。');
    if (!Array.isArray(c.keywords) || !c.keywords.every(k => typeof k === 'string')) return fail('有一個分類的關鍵字格式不正確（應為字串陣列）。');
  }

  return { error: null, state: work };
}

function loadState() {
  let raw = null;
  try {
    raw = localStorage.getItem(STORAGE_KEY);
  } catch (e) {
    storageAvailable = false;
    return defaultState();
  }
  if (!raw) return defaultState();
  try {
    const parsed = JSON.parse(raw);
    const result = deepValidateAndMigrate(parsed);
    if (result.error) {
      stateBlocked = true;
      alert('偵測到本機資料有問題（' + result.error + '）。為了避免覆蓋你原本存在手機裡的資料，所有新增/修改/刪除功能已暫時鎖定，請到「備份」頁做救援匯出，或匯入正確版本的備份檔來還原。');
      return defaultState();
    }
    return result.state;
  } catch (e) {
    stateBlocked = true;
    alert('讀取本機資料失敗（資料可能損毀）。為了避免覆蓋你原本存在手機裡的資料，所有新增/修改/刪除功能已暫時鎖定，請到「備份」頁做救援匯出，或匯入備份檔來還原。');
    return defaultState();
  }
}

let state = loadState();
const PRIVACY_MASK = 'NT$••••';
let privacyAmountsHidden = state.data.settings.privacyModeAutoHide === true;

function saveState() {
  if (stateBlocked) {
    alert('目前處於鎖定狀態（本機資料版本不相容或已損毀），無法儲存。請先到「備份」頁匯入正確的備份檔。');
    return;
  }
  state.updatedAt = nowIso();
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {
    storageAvailable = false;
    if (!storageWarningShown) {
      storageWarningShown = true;
      alert('儲存失敗（可能是裝置儲存空間已滿，或瀏覽器封鎖了本機儲存功能）。剛剛的修改暫時只存在畫面上，離開頁面就會遺失。請立刻到「備份」頁匯出 JSON 備份保住資料，並檢查瀏覽器儲存空間。');
    }
  }
}

// 從有效備份檔還原資料時呼叫這個函式（而不是直接改 state 再存檔），
// 才會正確解除鎖定狀態；Task 9 的匯入流程會用到
function restoreState(newState) {
  stateBlocked = false;
  state = newState;
  saveState();
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

// 用本地時區組「今天」的日期字串，不能用 toISOString()（那是 UTC，台灣 00:00-07:59 會抓到昨天）
function todayLocalDate() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function nowIso() {
  return new Date().toISOString();
}

function getCollection(path) {
  return path.split('.').reduce((obj, key) => obj[key], state.data);
}

function ensureWritable() {
  if (stateBlocked) {
    alert('目前處於鎖定狀態（本機資料版本不相容或已損毀），新增/修改/刪除功能暫停使用。請先到「備份」頁匯入正確的備份檔。');
    return false;
  }
  return true;
}

function addRecord(path, record) {
  if (!ensureWritable()) return null;
  const collection = getCollection(path);
  const withMeta = Object.assign({}, record, { id: genId(), createdAt: nowIso(), updatedAt: nowIso() });
  collection.push(withMeta);
  saveState();
  return withMeta;
}

function updateRecord(path, id, patch) {
  if (!ensureWritable()) return null;
  const collection = getCollection(path);
  const idx = collection.findIndex(r => r.id === id);
  if (idx === -1) throw new Error('Record not found: ' + id);
  collection[idx] = Object.assign({}, collection[idx], patch, { updatedAt: nowIso() });
  saveState();
  return collection[idx];
}

function deleteRecord(path, id) {
  if (!ensureWritable()) return false;
  const collection = getCollection(path);
  const idx = collection.findIndex(r => r.id === id);
  if (idx === -1) return false;
  collection.splice(idx, 1);
  saveState();
  return true;
}

function addInstallment(cardId, installment) {
  if (!ensureWritable()) return null;
  const card = state.data.creditCards.find(c => c.id === cardId);
  if (!card) return null;
  const withMeta = Object.assign({}, installment, { id: genId(), createdAt: nowIso(), updatedAt: nowIso() });
  card.installments.push(withMeta);
  saveState();
  return withMeta;
}

function updateInstallment(cardId, installmentId, patch) {
  if (!ensureWritable()) return null;
  const card = state.data.creditCards.find(c => c.id === cardId);
  if (!card) return null;
  const idx = card.installments.findIndex(i => i.id === installmentId);
  if (idx === -1) return null;
  card.installments[idx] = Object.assign({}, card.installments[idx], patch, { updatedAt: nowIso() });
  saveState();
  return card.installments[idx];
}

function deleteInstallment(cardId, installmentId) {
  if (!ensureWritable()) return false;
  const card = state.data.creditCards.find(c => c.id === cardId);
  if (!card) return false;
  const idx = card.installments.findIndex(i => i.id === installmentId);
  if (idx === -1) return false;
  card.installments.splice(idx, 1);
  saveState();
  return true;
}

function sum(arr, field) {
  return arr.reduce((total, item) => total + item[field], 0);
}

// 嚴格解析「正整數」字串：只接受純數字（不接受 "100abc"、空字串、小數、負數），回傳整數或 null
function parsePositiveInt(str) {
  const s = normalizeNumberString(str);
  if (!/^\d+$/.test(s)) return null;
  const n = Number(s);
  return (Number.isInteger(n) && n > 0) ? n : null;
}

// 嚴格解析「整數」字串（允許 0 與負數，例如帳戶期初餘額可能是 0 或負）：回傳整數或 null
function parseAnyInt(str) {
  const s = normalizeNumberString(str);
  if (!/^-?\d+$/.test(s)) return null;
  const n = Number(s);
  return Number.isInteger(n) ? n : null;
}

// ===================== 2. 衍生計算層 =====================
function getCardBillingMonth(card, dateStr) {
  const d = new Date(dateStr + 'T00:00:00');
  const day = d.getDate();
  let year = d.getFullYear();
  let month = d.getMonth(); // 0-indexed
  if (day > card.statementDay) {
    month += 1;
    if (month > 11) { month = 0; year += 1; }
  }
  return year + '-' + String(month + 1).padStart(2, '0');
}

function currentYearMonth() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function monthlyFamilyExpense(yearMonth) {
  return sum(
    state.data.transactions.filter(t => t.scope === 'family' && t.date.slice(0, 7) === yearMonth),
    'amount'
  );
}

function familyFundCashBalance() {
  return FAMILY_CATEGORIES.reduce((total, c) => total + familyFundCashBalanceByCategory(c), 0);
}

function familyFundCashBalanceByCategory(category) {
  return familyEnvelopeLedgerEntries(category).reduce((total, entry) => total + entry.cashDelta, 0);
}

function familyFundPendingReimbursement() {
  return FAMILY_CATEGORIES.reduce((total, c) => total + familyFundPendingReimbursementByCategory(c), 0);
}

function familyFundPendingReimbursementByCategory(category) {
  return familyEnvelopeLedgerEntries(category).reduce((total, entry) => total + entry.pendingDelta, 0);
}

function familyFundEstimatedBalance() {
  return FAMILY_CATEGORIES.reduce((total, c) => total + familyFundEstimatedBalanceByCategory(c), 0);
}

function familyFundEstimatedBalanceByCategory(category) {
  return familyEnvelopeLedgerEntries(category).reduce((total, entry) => total + entry.estimatedDelta, 0);
}

function familyCategoryTotals(yearMonth) {
  const result = {};
  FAMILY_CATEGORIES.forEach(c => {
    result[c] = sum(
      state.data.transactions.filter(t => t.scope === 'family' && t.category === c && t.date.slice(0, 7) === yearMonth),
      'amount'
    );
  });
  return result;
}

function familyFundStatusHtml(cash, pending, estimated) {
  if (estimated < 0) {
    return '<div class="status-note neg"><b>家庭基金不足 ' + money(Math.abs(estimated)) + '</b>：可先用個人帳戶補款，或增加家庭基金存入。</div>';
  }
  if (pending > 0) {
    return '<div class="status-note muted">有 ' + money(pending) + ' 家庭刷卡支出尚未補款；補款到個人帳戶後，可用個人帳戶繳信用卡。</div>';
  }
  if (pending < 0) {
    return '<div class="status-note muted">已超額補款 ' + money(Math.abs(pending)) + '，下次補款前可先核對是否有重複記錄。</div>';
  }
  return '';
}

function familyPendingByCardHtml(category) {
  const rows = state.data.creditCards.map(card => {
    const charges = sum(state.data.transactions.filter(t => t.scope === 'family' && t.category === category && t.paymentMethod === 'creditCard' && t.cardId === card.id), 'amount');
    const linked = sum(state.data.familyFundReimbursements.filter(r => r.category === category && r.cardId === card.id), 'amount');
    if (charges <= 0 && linked <= 0) return '';
    const remaining = charges - linked;
    return '<div class="row"><span><b>' + escapeHtml(card.name) + '</b><br><span class="muted">刷卡 ' + money(charges) + '／已補 ' + money(linked) + '／待補 ' + money(remaining) + (remaining < 0 ? '（已超額補款）' : '') + '</span></span>' +
      '<button class="btn-ghost" onclick="openQuickReimbursement(\'' + category + '\',\'' + card.id + '\')">補款</button></div>';
  }).filter(Boolean).join('');
  const unassigned = sum(state.data.familyFundReimbursements.filter(r => r.category === category && r.cardId == null), 'amount');
  const unassignedRow = unassigned > 0 ? '<div class="row"><span>未指定信用卡的補款</span><span>−' + money(unassigned) + '</span></div>' : '';
  return rows || unassignedRow ? '<details class="tucked"><summary>待補款來源</summary>' + rows + unassignedRow + '</details>' : '';
}

function quickReimbRemaining(category, cardId) {
  if (cardId == null) return familyFundPendingReimbursementByCategory(category);
  const charges = sum(state.data.transactions.filter(t => t.scope === 'family' && t.category === category && t.paymentMethod === 'creditCard' && t.cardId === cardId), 'amount');
  const linked = sum(state.data.familyFundReimbursements.filter(r => r.category === category && r.cardId === cardId), 'amount');
  return charges - linked;
}

const ACCOUNT_LEDGER_PRIORITIES = {
  manual: 0,
  personal: 1,
  family: 2,
  familyDeposit: 3,
  cardPayment: 4,
  familyReimbursement: 5
};

const ENVELOPE_LEDGER_PRIORITIES = {
  familyDeposit: 0,
  familyCash: 1,
  familyBank: 2,
  familyCard: 3,
  familyReimbursement: 4
};

const CASH_LEDGER_PRIORITIES = { manual:0, personalCash:1, familyDeposit:2, cashReimbursement:3 };
const CARD_LEDGER_PRIORITIES = { personalCharge:0, familyCharge:1, installmentCreated:2, installmentPayment:3, payment:4 };

function ledgerNewestFirst(a, b) {
  if (a.date !== b.date) return b.date.localeCompare(a.date);
  const createdCompare = (b.createdAt || '').localeCompare(a.createdAt || '');
  if (createdCompare !== 0) return createdCompare;
  if (a.priority !== b.priority) return a.priority - b.priority;
  return String(a.sourceId).localeCompare(String(b.sourceId));
}

function accountLedgerEntries(accountId) {
  const account = state.data.bankAccounts.find(a => a.id === accountId);
  if (!account) throw new Error('Account not found: ' + accountId);
  const entries = [];
  const push = (record, kind, label, delta, title, detail, source) => entries.push({
    source, sourceId: record.id, date: record.date, createdAt: record.createdAt || '',
    kind, label, delta, title, detail, priority: ACCOUNT_LEDGER_PRIORITIES[kind], balanceAfter: account.openingBalance
  });

  state.data.accountManualMovements.filter(m => m.accountId === accountId).forEach(m => {
    push(m, 'manual', '手動異動', m.direction === '存入' ? m.amount : -m.amount,
      m.direction + (m.note ? '：' + m.note : ''), m.note || '', 'accountManualMovements');
  });
  state.data.transactions.filter(t => t.paymentMethod === 'bankAccount' && t.accountId === accountId).forEach(t => {
    const kind = t.scope === 'family' ? 'family' : 'personal';
    push(t, kind, t.scope === 'family' ? '家庭支出' : '個人支出', -t.amount,
      t.note || t.category, t.category + (t.note ? ' · ' + t.note : ''), 'transactions');
  });
  state.data.familyFundDeposits.filter(d => d.fromAccountId === accountId).forEach(d => {
    push(d, 'familyDeposit', '家庭存入', -d.amount, '轉入' + d.category + '信封',
      (d.depositedBy || '家庭') + '存入 ' + d.category, 'familyFundDeposits');
  });
  state.data.creditCardPayments.filter(p => p.fromAccountId === accountId).forEach(p => {
    const card = state.data.creditCards.find(c => c.id === p.cardId);
    push(p, 'cardPayment', '信用卡還款', -p.amount, '繳交' + (card ? card.name : '信用卡'),
      p.note || (card ? card.name : ''), 'creditCardPayments');
  });
  state.data.familyFundReimbursements.filter(r => r.method !== 'cash' && r.toAccountId === accountId).forEach(r => {
    const card = state.data.creditCards.find(c => c.id === r.cardId);
    push(r, 'familyReimbursement', '家庭補款', r.amount, r.category + '補款轉入',
      (card ? card.name + ' · ' : '') + (r.note || r.category), 'familyFundReimbursements');
  });

  entries.sort(ledgerNewestFirst);
  let running = account.openingBalance;
  [...entries].reverse().forEach(entry => {
    running += entry.delta;
    entry.balanceAfter = running;
  });
  return entries;
}

function bankAccountBalanceAsOf(accountId, date) {
  const account = state.data.bankAccounts.find(a => a.id === accountId);
  if (!account) throw new Error('Account not found: ' + accountId);
  return account.openingBalance + accountLedgerEntries(accountId)
    .filter(entry => !date || entry.date <= date)
    .reduce((total, entry) => total + entry.delta, 0);
}

function bankAccountBalance(accountId) {
  return bankAccountBalanceAsOf(accountId, null);
}

function cashWalletLedgerEntries() {
  const wallet = state.data.cashWallet;
  if (!wallet) return [];
  const entries = [];
  const push = (record, kind, label, delta, title, detail, source) => {
    if (!record.date || record.date < wallet.startDate) return;
    entries.push({ source, sourceId:record.id, date:record.date, createdAt:record.createdAt || '', kind, label, delta,
      title, detail, priority:CASH_LEDGER_PRIORITIES[kind], balanceAfter:wallet.openingBalance });
  };
  state.data.cashManualMovements.forEach(m => push(m,'manual','手動異動',m.direction==='存入'?m.amount:-m.amount,m.direction+(m.note?'：'+m.note:''),m.note||'','cashManualMovements'));
  state.data.transactions.filter(t => t.scope==='personal' && t.paymentMethod==='cash').forEach(t => push(t,'personalCash','個人支出',-t.amount,t.note||t.category,t.category+(t.note?' · '+t.note:''),'transactions'));
  state.data.familyFundDeposits.filter(d => d.fromAccountId==null).forEach(d => push(d,'familyDeposit','存入家用',-d.amount,'轉入'+d.category+'信封',(d.depositedBy||'家庭')+'存入','familyFundDeposits'));
  state.data.familyFundReimbursements.filter(r => r.method==='cash').forEach(r => push(r,'cashReimbursement','家用補款',r.amount,'家用現金結清',r.note||r.category,'familyFundReimbursements'));
  entries.sort(ledgerNewestFirst);
  let running=wallet.openingBalance;
  [...entries].reverse().forEach(entry=>{running+=entry.delta;entry.balanceAfter=running;});
  return entries;
}

function cashWalletBalanceAsOf(date) {
  if (!state.data.cashWallet) return 0;
  return state.data.cashWallet.openingBalance + cashWalletLedgerEntries().filter(e=>!date||e.date<=date).reduce((n,e)=>n+e.delta,0);
}
function cashWalletBalance() { return cashWalletBalanceAsOf(null); }

function familyEnvelopeLedgerEntries(category) {
  if (FAMILY_CATEGORIES.indexOf(category) === -1) throw new Error('Unknown family category: ' + category);

    .filter(r => r.module === 'familyFund' && r.refId === category && r.adjustmentRecordId)
    .map(r => r.adjustmentRecordId));
  const entries = [];
  const push = (record, kind, label, cashDelta, pendingDelta, estimatedDelta, title, detail, source) => entries.push({
    source, sourceId: record.id, date: record.date, createdAt: record.createdAt || '', kind, label,
    category, title, detail, cashDelta, pendingDelta, estimatedDelta,
    priority: ENVELOPE_LEDGER_PRIORITIES[kind], cashAfter: 0, pendingAfter: 0, estimatedAfter: 0
  });

  state.data.familyFundDeposits.filter(d => d.category === category).forEach(d => {

  });

      push(t, 'familyCard', '信用卡家庭支出', 0, t.amount, -t.amount,
        t.note || t.category, card ? card.name : '信用卡', 'transactions');
    } else {
      const isBank = t.paymentMethod === 'bankAccount';
      const acc = isBank ? state.data.bankAccounts.find(a => a.id === t.accountId) : null;
      push(t, isBank ? 'familyBank' : 'familyCash', adjustmentIds.has(t.id) ? '對帳調整' : (isBank ? '銀行家庭支出' : '現金家庭支出'),
        -t.amount, 0, -t.amount, t.note || t.category, isBank ? (acc ? acc.name : '銀行帳戶') : '現金', 'transactions');
    }
  });
  state.data.familyFundReimbursements.filter(r => r.category === category).forEach(r => {

  });

  entries.sort(ledgerNewestFirst);
  let cash = 0;
  let pending = 0;

  [...entries].reverse().forEach(entry => {

    estimated += entry.estimatedDelta;

    entry.pendingAfter = pending;
    entry.estimatedAfter = estimated;
  });
  return entries;
}

function bankAccountsTotalAssets() {
  return state.data.bankAccounts.reduce((total, a) => total + bankAccountBalance(a.id), 0);
}

function creditCardDueThisPeriod(cardId) {
  const card = state.data.creditCards.find(c => c.id === cardId);
  if (!card) return 0;
  return creditCardDueForPeriod(cardId, currentBillingPeriod(card));
}

function currentBillingPeriod(card) {
  const d = new Date();
  let y = d.getFullYear();
  let m = d.getMonth();
  if (d.getDate() <= card.statementDay) {
    m -= 1;
    if (m < 0) {
      m = 11;
      y -= 1;
    }
  }
  return y + '-' + String(m + 1).padStart(2, '0');
}

function periodDueDate(card, period) {
  const [y, m] = period.split('-').map(Number);
  let py = y;
  let pm = m + 1;
  if (pm > 12) {
    pm = 1;
    py += 1;
  }
  const lastDay = new Date(py, pm, 0).getDate();
  return new Date(py, pm - 1, Math.min(card.dueDay, lastDay));
}

function creditCardDueForPeriod(cardId, period) {
  const card=state.data.creditCards.find(c=>c.id===cardId);
  const charges=sum(
    state.data.transactions.filter(t => t.paymentMethod === 'creditCard' && t.cardId === cardId && t.billingMonth === period && t.cardStatus !== '不列入計算'),
    'amount'
  );
  const installments=card ? card.installments.filter(inst=>installmentPeriodIndex(card,inst,period)>=0 && installmentPeriodIndex(card,inst,period)<inst.totalPeriods).reduce((n,inst)=>n+inst.perInstallment,0) : 0;
  return charges+installments;
}

function localDateFromIso(value) {
  const d = value ? new Date(value) : new Date();
  if (Number.isNaN(d.getTime())) return todayLocalDate();
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}
function installmentFirstPeriod(card,inst){return getCardBillingMonth(card,inst.date||localDateFromIso(inst.createdAt));}
function installmentPeriodIndex(card,inst,period){
  const first=installmentFirstPeriod(card,inst).split('-').map(Number), target=period.split('-').map(Number);
  return (target[0]-first[0])*12+(target[1]-first[1]);
}
function installmentDuePeriodsThrough(card,inst,period){return Math.max(0,Math.min(inst.totalPeriods,installmentPeriodIndex(card,inst,period)+1));}

function installmentRemainingPrincipal(inst) {
  const remainingPeriods = Math.max(0, inst.totalPeriods - inst.paidPeriods);
  if (remainingPeriods === 0) return 0;
  return Math.min(inst.totalAmount, inst.perInstallment * remainingPeriods);
}

function creditCardInstallmentPrincipal(cardId) {
  const card = state.data.creditCards.find(c => c.id === cardId);
  return card ? card.installments.reduce((total, inst) => total + installmentRemainingPrincipal(inst), 0) : 0;
}

function installmentDatedPayments(inst) {
  const dates=Array.isArray(inst.paidDates)?inst.paidDates:[];
  const undated=Math.max(0,inst.paidPeriods-dates.length);
  return dates.map((date,index)=>{
    const before=Object.assign({},inst,{paidPeriods:undated+index});
    const after=Object.assign({},inst,{paidPeriods:undated+index+1});
    return {date,amount:installmentRemainingPrincipal(before)-installmentRemainingPrincipal(after),index};
  });
}

function creditCardLedgerEntries(cardId) {
  const card=state.data.creditCards.find(c=>c.id===cardId); if(!card) throw new Error('Card not found: '+cardId);
  const entries=[]; const push=(record,kind,label,delta,title,detail,source,date)=>entries.push({source,sourceId:record.id,date:date||record.date,createdAt:record.createdAt||'',kind,label,delta,title,detail,priority:CARD_LEDGER_PRIORITIES[kind],balanceAfter:0});
  state.data.transactions.filter(t=>t.paymentMethod==='creditCard'&&t.cardId===cardId&&t.cardStatus!=='不列入計算').forEach(t=>{const family=t.scope==='family';push(t,family?'familyCharge':'personalCharge',family?'家庭刷卡':'個人刷卡',t.amount,t.note||t.category,[t.category,t.note,t.billingMonth,t.cardStatus].filter(Boolean).join(' · '),'transactions');});
  state.data.creditCardPayments.filter(p=>p.cardId===cardId).forEach(p=>{const a=state.data.bankAccounts.find(x=>x.id===p.fromAccountId);push(p,'payment','還款',-p.amount,'信用卡還款',(a?a.name:'未指定帳戶')+(p.note?' · '+p.note:''),'creditCardPayments');});
  card.installments.forEach(inst=>{const dated=installmentDatedPayments(inst);const createdDelta=installmentRemainingPrincipal(inst)+dated.reduce((n,p)=>n+p.amount,0);const undated=Math.max(0,inst.paidPeriods-dated.length);push(inst,'installmentCreated','分期建立',createdDelta,inst.note||'分期',money(inst.totalAmount)+(undated?' · 其中 '+undated+' 期為無日期補登':''),'installments',inst.date||localDateFromIso(inst.createdAt));dated.forEach(p=>push(Object.assign({},inst,{id:inst.id+'p'+p.index,createdAt:p.date+'T23:59:59.000Z'}),'installmentPayment','分期繳一期',-p.amount,inst.note||'分期','第 '+(Math.max(0,inst.paidPeriods-dated.length)+p.index+1)+' 期','installments',p.date));});
  entries.sort(ledgerNewestFirst);let running=0;[...entries].reverse().forEach(e=>{running+=e.delta;e.balanceAfter=running;});return entries;
}

function cardPaymentReminder(card) {
  const period = currentBillingPeriod(card);
  const dueUpTo = sum(
    state.data.transactions.filter(t => t.paymentMethod === 'creditCard' && t.cardId === card.id && t.cardStatus !== '不列入計算' && t.billingMonth <= period),
    'amount'
  ) + card.installments.reduce((total,inst)=>total+inst.perInstallment*installmentDuePeriodsThrough(card,inst,period),0);
  const paid = sum(state.data.creditCardPayments.filter(p => p.cardId === card.id), 'amount');
  const unpaid = dueUpTo - paid;
  if (unpaid <= 0) return { level: 'none', amount: 0, dueDate: null, period };

  const dueDate = periodDueDate(card, period);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diffDays = Math.round((dueDate - today) / 86400000);
  if (diffDays < 0) return { level: 'overdue', amount: unpaid, dueDate, period };
  if (diffDays <= 3) return { level: 'due-soon', amount: unpaid, dueDate, period };
  return { level: 'none', amount: unpaid, dueDate, period };
}

function creditCardTotalOwed(cardId) {
  const charges = sum(
    state.data.transactions.filter(t => t.paymentMethod === 'creditCard' && t.cardId === cardId && t.cardStatus !== '不列入計算'),
    'amount'
  );
  const paid = sum(state.data.creditCardPayments.filter(p => p.cardId === cardId), 'amount');
  return charges - paid + creditCardInstallmentPrincipal(cardId);
}

function creditCardAvailableCredit(cardId) {
  const card = state.data.creditCards.find(c => c.id === cardId);
  return card.creditLimit - creditCardTotalOwed(cardId);
}

function personalMonthlyTotal(yearMonth) {
  return sum(
    state.data.transactions.filter(t => t.scope === 'personal' && t.date.slice(0, 7) === yearMonth),
    'amount'
  );
}

function personalCategoryTotals(yearMonth) {
  const result = {};
  state.data.transactions
    .filter(t => t.scope === 'personal' && t.date.slice(0, 7) === yearMonth)
    .forEach(t => {
      const cat = t.category || '其他';
      result[cat] = (result[cat] || 0) + t.amount;
    });
  return result;
}

function addMonthsToYearMonth(ym, delta) {
  const parts = ym.split('-').map(Number);
  const d = new Date(parts[0], parts[1] - 1 + delta, 1);
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
}

function reportSummary(yearMonth) {
  const personal = personalMonthlyTotal(yearMonth);
  const family = monthlyFamilyExpense(yearMonth);
  return { personal, family, total: personal + family };
}

function reportCategoryRanking(yearMonth) {
  function toRanking(totals) {
    return Object.keys(totals)
      .map(category => ({ category, amount: totals[category] }))
      .filter(item => item.amount > 0)
      .sort((a, b) => b.amount - a.amount || a.category.localeCompare(b.category, 'zh-Hant'));
  }
  return {
    personal: toRanking(personalCategoryTotals(yearMonth)),
    family: toRanking(familyCategoryTotals(yearMonth))
  };
}

function reportSixMonthTrend(endYearMonth) {
  return Array.from({ length: 6 }, (_, index) => {
    const ym = addMonthsToYearMonth(endYearMonth, index - 5);
    return Object.assign({ ym }, reportSummary(ym));
  });
}

function suggestCategory(note) {
  const lower = note.toLowerCase();
  for (const entry of state.data.categoryKeywords) {
    if (entry.keywords.some(k => lower.includes(k.toLowerCase()))) return entry.category;
  }
  return '其他';
}

function escapeHtml(s) {

}

function openModal(title, bodyHtml) {
  const modal = document.getElementById('modal');

    '<h2>' + escapeHtml(title) + '</h2>' + bodyHtml + '</div>';

function closeModal() {
  const modal = document.getElementById('modal');

let pendingConfirmAction = null;
function openConfirmModal(title, message, action, dangerText) {
  pendingConfirmAction = action;
  openModal(title,
    '<p>' + escapeHtml(message) + '</p>' +

function clearFieldError(id) {
  const field = document.getElementById(id);
  if (!field) return;
  field.removeAttribute('aria-invalid');
  field.removeAttribute('aria-describedby');
  const old = document.getElementById(id + '_error');
  if (old) old.remove();
}

function showFieldError(id, msg) {
  const field = document.getElementById(id);
  if (!field) {
    showToast(msg);
    return;
  }
  clearFieldError(id);
  const error = document.createElement('div');
  error.id = id + '_error';
  error.className = 'field-error';
  error.textContent = msg;
  field.setAttribute('aria-invalid', 'true');
  field.setAttribute('aria-describedby', error.id);
  field.insertAdjacentElement('afterend', error);
  field.focus();
}

function normalizeNumberString(str) {
  return String(str == null ? '' : str).trim().replace(/[,\s，]/g, '');
}

function enhanceFormAccessibility(root) {
  root = root || document;
  root.querySelectorAll('label:not([for])').forEach(label => {
    const nested = label.querySelector('input, select, textarea');
    if (nested && nested.id) {
      label.setAttribute('for', nested.id);
      return;
    }
    let node = label.nextElementSibling;
    while (node && node.classList && node.classList.contains('muted')) node = node.nextElementSibling;
    const control = node && (node.matches('input, select, textarea') ? node : node.querySelector && node.querySelector('input, select, textarea'));
    if (control && control.id) label.setAttribute('for', control.id);
  });
}

let toastTimer = null;
function showToast(msg) {
  const box = document.getElementById('toast');
  box.innerHTML = '<div class="toast-msg">' + escapeHtml(msg) + '</div>';
  const el = box.firstChild;
  requestAnimationFrame(() => el.classList.add('show'));
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    el.classList.remove('show');
    setTimeout(() => { box.innerHTML = ''; }, 300);
  }, 2200);
}

function renderKeepScroll() {
  const y = window.scrollY;
  render();
  window.scrollTo(0, y);
}

function revealRecord(id) {
  if (!id) return;
  requestAnimationFrame(() => {
    const el = document.querySelector('[data-record-id="' + id + '"]');
    if (!el) return;
    const dateGroup = el.closest('.detail-date-group');
    if (dateGroup) {
      detailGroupOpenState[detailGroupStateKey(dateGroup.dataset.detailPane, dateGroup.dataset.detailDate)] = true;
      dateGroup.open = true;
    }
    el.classList.add('just-saved');
    el.scrollIntoView({ block: 'center', behavior: 'smooth' });
    setTimeout(() => el.classList.remove('just-saved'), 1800);
  });
}

function iconHtml(name, className) {
  const body = ICONS[name];
  if (!body) return '';
  return '<svg class="icon' + (className ? ' ' + className : '') + '" viewBox="0 0 24 24" aria-hidden="true">' + body + '</svg>';
}

function privacyToggleHtml() {
  return '<div class="app-topbar">' +
    '<div class="app-identity"><span class="app-mark">' + iconHtml('family') + '</span>' +
    '<div><div class="app-name">我們家的資金路線</div><div class="app-kicker">家庭與個人記帳</div></div></div>' +
    '<button class="privacy-toggle" aria-pressed="' + (privacyAmountsHidden ? 'true' : 'false') + '" onclick="handleTogglePrivacy()">' +
    iconHtml(privacyAmountsHidden ? 'privacyShow' : 'privacyHide') +
    '<span>' + (privacyAmountsHidden ? '顯示金額' : '隱藏金額') + '</span></button></div>';
}

function formatDateShort(date) {
  return (date.getMonth() + 1) + '/' + date.getDate();
}

function movedOutOfCurrentFilter(scope, oldDate, newDate) {
  const f = listFilters && listFilters[scope];
  if (!f || f.showAll || !oldDate || !newDate) return false;
  return oldDate.slice(0, 7) === f.month && newDate.slice(0, 7) !== f.month;
}

function editSuccessMessage(scope, oldDate, newDate, fallback) {
  return movedOutOfCurrentFilter(scope, oldDate, newDate)
    ? fallback + '；日期不在目前篩選月份，記錄已移到對應月份'
    : fallback;
}

function lastReconciliation(module, refId) {
  return state.data.monthlyReconciliation
    .filter(r => r.module === module && (refId === undefined || r.refId === refId))
    .sort((a, b) => {
      if (a.date !== b.date) return b.date.localeCompare(a.date);
      return (b.createdAt || '').localeCompare(a.createdAt || '');
    })[0] || null;
}

function renderLastReconciliation(module, refId) {
  const last = lastReconciliation(module, refId);
  return last
    ? '<div class="muted">上次對帳：' + last.date + '，' + (last.diff === 0 ? '沒有落差' : '落差 ' + money(last.diff)) + '</div>'
    : '<div class="muted">尚未對帳過</div>';
}

function reconciliationJumpTarget(module) {
  return module === 'familyFund' ? 'family' : (module === 'creditCard' ? 'creditCards' : (module === 'cashWallet' ? 'cashWallet' : 'bankAccounts'));
}

function reconciliationHistory(module, refId) {
  return state.data.monthlyReconciliation
    .filter(r => r.module === module && (refId === undefined || r.refId === refId))
    .sort((a, b) => {
      if (a.date !== b.date) return b.date.localeCompare(a.date);
      return (b.createdAt || '').localeCompare(a.createdAt || '');
    })
    .slice(0, 5);
}

function renderReconciliationHistory(module, refId) {
  const history = reconciliationHistory(module, refId);
  if (history.length === 0) return '';
  const rows = history.map(r => (
    '<div class="row"><span>' + r.date + '</span><span>' + (r.diff === 0 ? '沒有落差' : money(r.diff)) + '</span></div>'
  )).join('');
  return '<details class="tucked"><summary>最近對帳（' + history.length + '）</summary>' + rows + '</details>';
}

function reconciliationAdjustmentText(diff, options) {
  if (diff < 0 && options.adjustmentNegative) return options.adjustmentNegative;
  if (diff > 0 && options.adjustmentPositive) return options.adjustmentPositive;
  return '自動產生一筆' + (diff < 0 ? '提出' : '存入') + '記錄補齊差額';
}

function ensureReconciliationWritable() {
  if (!stateBlocked) return true;
  showFieldError('reconcileActual', '目前處於鎖定狀態，請先到「備份」頁匯入正確版本的備份檔。');
  showToast('目前處於鎖定狀態，無法儲存對帳');
  return false;
}

function checkOrphanAndAmounts() {
  const accountIds = new Set(state.data.bankAccounts.map(a => a.id));
  const cardIds = new Set(state.data.creditCards.map(c => c.id));
  const problems = [];
  const label = (primary, fallback) => primary || fallback || '未命名';

  state.data.transactions.forEach(t => {
    const name = label(t.note, t.category);
    if (!(Number.isInteger(t.amount) && t.amount > 0)) {
      problems.push({ type: '金額異常', desc: '交易「' + name + '」金額不是正整數', id: t.id, jump: t.scope });
    }
    if (t.scope === 'family' && FAMILY_CATEGORIES.indexOf(t.category) === -1) {
      problems.push({ type: '資料異常', desc: '交易「' + name + '」的家庭分類不正確', id: t.id, jump: 'family' });
    }
    if (t.paymentMethod === 'bankAccount' && !accountIds.has(t.accountId)) {
      problems.push({ type: '孤兒資料', desc: '交易「' + name + '」指向不存在的銀行帳戶', id: t.id, jump: t.scope });
    }
    if (t.paymentMethod === 'creditCard' && !cardIds.has(t.cardId)) {
      problems.push({ type: '孤兒資料', desc: '交易「' + name + '」指向不存在的信用卡', id: t.id, jump: t.scope });
    }
  });

  state.data.creditCardPayments.forEach(p => {
    if (!(Number.isInteger(p.amount) && p.amount > 0)) problems.push({ type: '金額異常', desc: '一筆還款金額不是正整數', id: p.id, jump: 'creditCards' });
    if (!cardIds.has(p.cardId)) problems.push({ type: '孤兒資料', desc: '一筆還款指向不存在的信用卡', id: p.id, jump: 'creditCards' });
    if (p.fromAccountId != null && !accountIds.has(p.fromAccountId)) problems.push({ type: '孤兒資料', desc: '一筆還款指向不存在的帳戶', id: p.id, jump: 'creditCards' });
  });

  state.data.creditCards.forEach(c => {
    c.installments.forEach(inst => {
      if (!Number.isInteger(inst.totalAmount) || inst.totalAmount <= 0) {
        problems.push({ type: '金額異常', desc: c.name + ' 的一筆分期總額不是正整數', id: inst.id, jump: 'creditCards' });
      }
      if (!Number.isInteger(inst.perInstallment) || inst.perInstallment <= 0) {
        problems.push({ type: '金額異常', desc: c.name + ' 的一筆分期每期金額不是正整數', id: inst.id, jump: 'creditCards' });
      }
      if (!Number.isInteger(inst.totalPeriods) || inst.totalPeriods <= 0) {
        problems.push({ type: '金額異常', desc: c.name + ' 的一筆分期總期數不是正整數', id: inst.id, jump: 'creditCards' });
      }
      if (!Number.isInteger(inst.paidPeriods) || inst.paidPeriods < 0 || inst.paidPeriods > inst.totalPeriods) {
        problems.push({ type: '資料異常', desc: c.name + ' 的一筆分期已還期數不正確', id: inst.id, jump: 'creditCards' });
      }
    });
  });

  state.data.accountManualMovements.forEach(m => {
    if (!(Number.isInteger(m.amount) && m.amount > 0)) problems.push({ type: '金額異常', desc: '一筆帳戶異動金額不是正整數', id: m.id, jump: 'bankAccounts' });
    if (!accountIds.has(m.accountId)) problems.push({ type: '孤兒資料', desc: '一筆帳戶異動指向不存在的帳戶', id: m.id, jump: 'bankAccounts' });
  });
  state.data.cashManualMovements.forEach(m => {
    if (!(Number.isInteger(m.amount) && m.amount > 0)) problems.push({ type:'金額異常', desc:'一筆現金異動金額不是正整數', id:m.id, jump:'cashWallet' });
    if (!isValidDateString(m.date) || (m.direction!=='存入'&&m.direction!=='提出')) problems.push({ type:'資料異常', desc:'一筆現金異動格式不正確', id:m.id, jump:'cashWallet' });
  });

  state.data.familyFundDeposits.forEach(d => {
    if (!(Number.isInteger(d.amount) && d.amount > 0)) problems.push({ type: '金額異常', desc: '一筆家庭基金存入金額不是正整數', id: d.id, jump: 'family' });
    if (FAMILY_CATEGORIES.indexOf(d.category) === -1) problems.push({ type: '資料異常', desc: '一筆家庭基金存入的類別不正確', id: d.id, jump: 'family' });
    if (d.fromAccountId != null && !accountIds.has(d.fromAccountId)) problems.push({ type: '孤兒資料', desc: '一筆存入指向不存在的帳戶', id: d.id, jump: 'family' });
  });

  state.data.familyFundReimbursements.forEach(r => {
    if (!(Number.isInteger(r.amount) && r.amount > 0)) problems.push({ type: '金額異常', desc: '一筆補款金額不是正整數', id: r.id, jump: 'family' });
    if (FAMILY_CATEGORIES.indexOf(r.category) === -1) problems.push({ type: '資料異常', desc: '一筆補款的類別不正確', id: r.id, jump: 'family' });
    if (r.method !== 'cash' && !accountIds.has(r.toAccountId)) problems.push({ type: '孤兒資料', desc: '一筆補款指向不存在的帳戶', id: r.id, jump: 'family' });
    if (r.method === 'cash' && r.toAccountId != null) problems.push({ type: '資料異常', desc: '一筆現金補款不應保留撥入帳戶', id: r.id, jump: 'family' });
    if (r.cardId != null && !cardIds.has(r.cardId)) problems.push({ type: '孤兒資料', desc: '一筆補款關聯到不存在的信用卡', id: r.id, jump: 'family' });
  });

  state.data.monthlyReconciliation.forEach(r => {
    const jump = reconciliationJumpTarget(r.module);
    if (r.module === 'bankAccount' && !accountIds.has(r.refId)) problems.push({ type: '孤兒資料', desc: '一筆對帳紀錄指向不存在的銀行帳戶', id: r.id, jump });
    if (r.module === 'creditCard' && !cardIds.has(r.refId)) problems.push({ type: '孤兒資料', desc: '一筆對帳紀錄指向不存在的信用卡', id: r.id, jump });
    if (r.module === 'familyFund' && FAMILY_CATEGORIES.indexOf(r.refId) === -1) problems.push({ type: '資料異常', desc: '一筆家庭基金對帳紀錄的類別不正確', id: r.id, jump: 'family' });
    if (r.diff !== r.actualBalance - r.recordedBalance) problems.push({ type: '資料異常', desc: '一筆對帳紀錄的差額跟實際/記錄餘額對不起來', id: r.id, jump });
    if (r.adjustmentRecordId != null) {
      const adjustmentExists = r.module === 'bankAccount'
        ? state.data.accountManualMovements.some(m => m.id === r.adjustmentRecordId)
        : r.module === 'familyFund'
          ? (r.diff < 0 ? state.data.transactions : state.data.familyFundDeposits).some(x => x.id === r.adjustmentRecordId)
          : r.module === 'cashWallet'
            ? state.data.cashManualMovements.some(m=>m.id===r.adjustmentRecordId)
            : false;
      if (!adjustmentExists) problems.push({ type: '孤兒資料', desc: '一筆對帳紀錄的調整記錄找不到對應的異動/交易/存入記錄', id: r.id, jump });
    }
  });

  return problems;
}

function checkHealthAnomalies() {
  const problems = [];
  FAMILY_CATEGORIES.forEach(cat => {
    const catCash = familyFundCashBalanceByCategory(cat);
    const catEstimated = familyFundEstimatedBalanceByCategory(cat);
    if (catCash < 0) problems.push({ type: '家庭基金', desc: cat + ' 信封現金餘額是負的（' + money(catCash) + '），可能有支出沒有對應的存入', jump: 'family' });
    if (catEstimated < 0) problems.push({ type: '家庭基金', desc: cat + ' 信封預估餘額是負的（' + money(catEstimated) + '），把已刷卡但還沒補款的部分算進去後會透支', jump: 'family' });
  });

  state.data.bankAccounts.forEach(a => {
    const balance = bankAccountBalance(a.id);
    if (balance < 0) problems.push({ type: '銀行帳戶', desc: a.name + ' 餘額是負的（' + money(balance) + '）', id: a.id, jump: 'bankAccounts' });
  });

  state.data.creditCards.forEach(c => {
    const owed = creditCardTotalOwed(c.id);
    if (owed > c.creditLimit) problems.push({ type: '信用卡', desc: c.name + ' 總欠款（' + money(owed) + '）超過額度（' + money(c.creditLimit) + '）', id: c.id, jump: 'creditCards' });
  });

  return problems;
}

const TEST_BACKUP_KEY = STORAGE_KEY + '_realDataBackup';
const TEST_MODE_KEY = STORAGE_KEY + '_testMode';

function isInTestMode() {
  try {
    return localStorage.getItem(TEST_MODE_KEY) === '1';
  } catch (e) {
    return false;
  }
}

function handleEnterTestMode() {
  if (stateBlocked) {
    alert('目前處於鎖定狀態，資料本身可能已損毀，不能在這個狀態下進入測試模式（避免把有問題的資料當成備份）。請先處理好鎖定狀態。');
    return;
  }
  if (isInTestMode()) {
    alert('已經在測試模式中，不能重複進入（會覆蓋掉唯一一份真實資料備份）。');
    return;
  }
  if (!confirm('這會暫時把你目前的真實資料換成假資料，方便你熟悉功能或測試計算邏輯。真實資料會被安全備份，退出測試模式時會完整還原。確定要進入測試資料模式嗎？')) return;

  const currentRaw = localStorage.getItem(STORAGE_KEY);
  if (!currentRaw) {
    alert('目前沒有偵測到任何本機資料可以備份，為安全起見取消操作。');
    return;
  }

  const fixtureState = buildTestFixtureState();
  const fixtureJson = JSON.stringify(fixtureState);
  const fixtureCheck = deepValidateAndMigrate(JSON.parse(fixtureJson));
  if (fixtureCheck.error) {
    alert('測試資料本身格式有問題（' + fixtureCheck.error + '），已取消，沒有動到任何資料。請聯絡協助排查測試資料產生邏輯。');
    return;
  }

  let backupWritten = false;
  let fixtureWritten = false;
  try {
    localStorage.setItem(TEST_BACKUP_KEY, currentRaw);
    backupWritten = true;
    localStorage.setItem(STORAGE_KEY, fixtureJson);
    fixtureWritten = true;
    localStorage.setItem(TEST_MODE_KEY, '1');
  } catch (e) {
    try {
      if (fixtureWritten) localStorage.setItem(STORAGE_KEY, currentRaw);
      if (backupWritten) localStorage.removeItem(TEST_BACKUP_KEY);
      localStorage.removeItem(TEST_MODE_KEY);
    } catch (e2) {
      alert('進入測試模式失敗，回復真實資料時也失敗。你的真實資料備份仍保留在 localStorage 的 "' + TEST_BACKUP_KEY + '" 這個 key 裡，請立刻聯絡協助手動處理，不要繼續操作。');
      return;
    }
    alert('進入測試模式失敗（可能是儲存空間問題），已確認沒有動到你的真實資料。');
    return;
  }
  state = loadState();
  render();
}

function handleExitTestMode() {
  if (!isInTestMode()) return;
  if (!confirm('確定要退出測試資料模式並還原你的真實資料嗎？測試期間產生的任何資料都會被丟棄。')) return;

  const backup = localStorage.getItem(TEST_BACKUP_KEY);
  if (!backup) {
    alert('找不到備份的真實資料，為安全起見不會清空目前畫面上的資料。請立刻聯絡協助排查，不要繼續操作。');
    return;
  }

  let parsedBackup;
  try {
    parsedBackup = JSON.parse(backup);
  } catch (e) {
    alert('備份資料無法解析，為安全起見不會還原、也不會刪除備份。請立刻聯絡協助處理，不要繼續操作。');
    return;
  }
  const backupCheck = deepValidateAndMigrate(parsedBackup);
  if (backupCheck.error) {
    alert('備份資料驗證失敗（' + backupCheck.error + '），為安全起見不會還原、也不會刪除備份。請立刻聯絡協助處理。');
    return;
  }

  try {
    localStorage.setItem(STORAGE_KEY, backup);
  } catch (e) {
    alert('還原失敗（可能是儲存空間問題），你的真實資料備份仍保留在 localStorage 的 "' + TEST_BACKUP_KEY + '" 這個 key 裡，不會遺失，請聯絡協助手動還原。');
    return;
  }
  localStorage.removeItem(TEST_BACKUP_KEY);
  localStorage.removeItem(TEST_MODE_KEY);
  state = loadState();
  render();
}

function testModeBannerHtml() {
  if (!isInTestMode()) return '';
  return '<div class="alert-overdue test-mode-banner" style="margin-bottom:12px"><div>目前是測試資料模式。<br>畫面上都是假資料，不是你的真實記帳。</div><button class="btn-ghost" onclick="handleExitTestMode()">退出測試模式</button></div>';
}

function hasBackupWorthyData() {
  const keys = [
    'transactions', 'familyFundDeposits', 'familyFundReimbursements',
    'creditCardPayments', 'accountManualMovements', 'monthlyReconciliation',
    'bankAccounts', 'creditCards'
  ];
  return keys.some(key => Array.isArray(state.data[key]) && state.data[key].length > 0);
}

function backupReminderInfo() {
  if (stateBlocked || isInTestMode() || !hasBackupWorthyData()) return { show: false, days: null };

  const now = new Date();
  const snoozedUntil = state.backupReminderSnoozedUntil ? new Date(state.backupReminderSnoozedUntil) : null;
  const maxSnooze = new Date(now.getTime() + BACKUP_REMINDER_SNOOZE_DAYS * 86400000);
  if (snoozedUntil && snoozedUntil > maxSnooze) {
    state.backupReminderSnoozedUntil = null;
    if (storageAvailable) saveState();
  } else if (snoozedUntil && now < snoozedUntil) {
    return { show: false, days: null };
  }

  if (!state.lastBackupAt) return { show: true, days: null };
  const backupDay = new Date(state.lastBackupAt);
  backupDay.setHours(0, 0, 0, 0);
  const today = new Date(now);
  today.setHours(0, 0, 0, 0);
  const days = Math.round((today - backupDay) / 86400000);
  if (days < 0) return { show: false, days };
  return { show: days >= BACKUP_REMINDER_DAYS, days };
}

function handleSnoozeBackupReminder() {
  state.backupReminderSnoozedUntil = new Date(Date.now() + BACKUP_REMINDER_SNOOZE_DAYS * 86400000).toISOString();
  saveState();
  render();
}

function backupReminderBannerHtml() {

function handleReconcileDiffInput(recorded, options) {
  options = options || {};
  const actual = parseAnyInt(document.getElementById('reconcileActual').value);
  const area = document.getElementById('reconcileDiffArea');
  clearFieldError('reconcileActual');
  if (actual === null) {
    area.innerHTML = '';
    return;
  }
  const diff = actual - recorded;
  if (diff === 0) {
    area.innerHTML = '<div class="status-note" style="margin-top:8px"><b>對帳完成</b>：金額相符，沒有落差。</div>';
    enhanceFormAccessibility(document.getElementById('modal'));
    return;
  }
  const alertClass = diff < 0 ? 'alert-overdue' : 'alert-due';
  if (options.allowAdjustment) {
    area.innerHTML =
      '<div class="' + alertClass + '" style="margin-top:8px"><b>待處理</b>：有落差 ' + money(diff) + '（' + (diff < 0 ? '實際比記錄少，可能漏記了支出' : '實際比記錄多，可能漏記了存入') + '）</div>' +
      '<label style="margin-top:8px"><input type="checkbox" id="reconcileCreateAdjustment"> 直接建立對帳調整（' + reconciliationAdjustmentText(diff, options) + '）</label>';
  } else {
    area.innerHTML =
      '<div class="' + alertClass + '" style="margin-top:8px">有落差：' + money(diff) + '。建議核對這張卡的逐筆消費、帳單月份、還款記錄；信用卡不建議用一筆調整蓋過差異。</div>';
  }
  enhanceFormAccessibility(document.getElementById('modal'));
}

function bankReconciliationLedgerEntries(accountId, cutoffDate, recentOnly) {
  const last = lastReconciliation('bankAccount', accountId);
  return accountLedgerEntries(accountId).filter(entry => {
    if (cutoffDate && entry.date > cutoffDate) return false;
    if (!recentOnly || !last) return true;
    return !!entry.createdAt && entry.createdAt > (last.createdAt || '');
  });
}

function signedMoney(delta) {
  return (delta >= 0 ? '+' : '−') + money(Math.abs(delta));
}

function ledgerEntryHtml(entry, editAction, extraAfterHtml) {
  return '<div class="ledger-item" data-ledger-kind="' + entry.kind + '" data-record-id="' + entry.sourceId + '">' +
    '<div class="ledger-head"><div><span class="ledger-badge">' + escapeHtml(entry.label) + '</span>' +
    '<div class="ledger-title">' + escapeHtml(entry.title || entry.label) + '</div></div>' +
    '<span class="ledger-delta ' + (entry.delta >= 0 ? 'income' : 'expense') + '">' + signedMoney(entry.delta) + '</span></div>' +
    '<div class="muted">' + entry.date + (entry.detail ? ' · ' + escapeHtml(entry.detail) : '') + '</div>' +
    (extraAfterHtml || '<div class="ledger-after"><span>交易後餘額 <b>' + money(entry.balanceAfter) + '</b></span></div>') +
    (editAction ? '<div class="action-row"><button class="btn-ghost" onclick="' + editAction + '">查看／編輯來源</button></div>' : '') +
    '</div>';
}

function submitBankReconciliation(accountId) {
  const actual = parseAnyInt(document.getElementById('reconcileActual').value);
  if (actual === null) { showFieldError('reconcileActual', '請輸入實際餘額（可以是 0 或負數，但不能有文字）'); return; }
  const dateEl = document.getElementById('reconcileDate');
  const date = dateEl && dateEl.value ? dateEl.value : todayLocalDate();
  if (!isValidDateString(date)) { showFieldError('reconcileDate', '請選擇有效的對帳日期'); return; }
  const recorded = bankAccountBalanceAsOf(accountId, date);
  if (!ensureReconciliationWritable()) return;
  const diff = actual - recorded;
  const wantsAdjustment = diff !== 0 && document.getElementById('reconcileCreateAdjustment') && document.getElementById('reconcileCreateAdjustment').checked;
  let adjustmentRecordId = null;
  if (wantsAdjustment) {
    const movement = addRecord('accountManualMovements', {
      accountId,
      date,
      amount: Math.abs(diff),
      direction: diff > 0 ? '存入' : '提出',
      note: '對帳調整（' + date.slice(0, 7) + '）'
    });
    if (!movement) { showToast('儲存失敗（可能處於鎖定狀態或儲存空間問題），請到備份頁確認'); return; }
    adjustmentRecordId = movement.id;
  }
  const saved = addRecord('monthlyReconciliation', {
    date,
    module: 'bankAccount',
    refId: accountId,
    recordedBalance: recorded,
    actualBalance: actual,
    diff,
    adjustmentRecordId
  });
  if (!saved) { showToast('儲存失敗（可能處於鎖定狀態或儲存空間問題），請到備份頁確認'); return; }
  closeModal();
  renderKeepScroll();
  revealRecord(accountId);
  showToast(diff === 0 ? '對帳完成，沒有落差' : ('已記錄對帳結果' + (wantsAdjustment ? '，並建立調整' : '')));
}

function cashWalletSourceMatches(entry, source) {
  if (!source || source === 'all') return true;
  if (source === 'manual') return entry.source === 'cashManualMovements';
  if (source === 'personal') return entry.source === 'transactions';
  if (source === 'familyDeposit') return entry.source === 'familyFundDeposits';
  if (source === 'reimbursement') return entry.source === 'familyFundReimbursements';
  return false;
}

function filterCashWalletLedgerEntries() {
  const f = listFilters.cashWallet;
  const scoped = cashWalletLedgerEntries().filter(entry =>
    (f.showAll || entry.date.slice(0, 7) === f.month) && cashWalletSourceMatches(entry, f.source)
  );
  return scoped.filter(entry => recordMatchesSearch(entry, f.search, ledgerSearchText));
}

  if (!startDate) { showFieldError('cashStartDate', '請選擇起算日'); return; }
  if (!ensureWritable()) return;
  state.data.cashWallet = { openingBalance, startDate };
  saveState();
  render();
  showToast('已更新現金錢包設定');
}

  return '<h2>現金</h2><div class="card"><div class="metric-row"><span>目前現金餘額</span><span class="big metric-value' + (cashWalletBalance() < 0 ? ' neg' : '') + '">' + money(cashWalletBalance()) + '</span></div>' +
